<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM Generative UI Landscape</title>
  <desc id="desc">Cover art for an article mapping the generative UI technology landscape.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="0.48" stop-color="#1f2a3a"/>
      <stop offset="1" stop-color="#122821"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .eyebrow { font: 800 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #8ee8d3; letter-spacing: 3px; }
      .title { font: 900 86px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 600 30px Inter, ui-sans-serif, system-ui, sans-serif; fill: #c7d5e6; letter-spacing: 0; }
      .label { font: 800 23px Inter, ui-sans-serif, system-ui, sans-serif; fill: #111827; letter-spacing: 0; }
      .note { font: 650 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #445063; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M150 655 C360 520 500 810 710 660 C880 540 1015 280 1450 360" fill="none" stroke="#72efd5" stroke-width="5" stroke-opacity="0.35"/>
  <path d="M165 735 C420 640 470 360 715 455 C905 530 1050 690 1430 580" fill="none" stroke="#f7d46f" stroke-width="5" stroke-opacity="0.28"/>
  <text x="110" y="145" class="eyebrow">AGENTS NEED MORE THAN CHAT</text>
  <text x="108" y="245" class="title">LLM Generative UI</text>
  <text x="112" y="342" class="title">Landscape</text>
  <text x="114" y="398" class="subtitle">Protocols, specs, components, hosts, and the trade-offs between them.</text>

  <g filter="url(#shadow)" transform="translate(120 525)">
    <rect width="285" height="130" rx="22" fill="#eaf8f3"/>
    <text x="28" y="50" class="label">AG-UI</text>
    <text x="28" y="82" class="note">runtime event pipe</text>
  </g>
  <g filter="url(#shadow)" transform="translate(455 600)">
    <rect width="285" height="130" rx="22" fill="#fff8dd"/>
    <text x="28" y="50" class="label">A2UI</text>
    <text x="28" y="82" class="note">declarative UI protocol</text>
  </g>
  <g filter="url(#shadow)" transform="translate(790 495)">
    <rect width="285" height="130" rx="22" fill="#f1f5ff"/>
    <text x="28" y="50" class="label">json-render</text>
    <text x="28" y="82" class="note">catalog to component tree</text>
  </g>
  <g filter="url(#shadow)" transform="translate(1125 580)">
    <rect width="315" height="130" rx="22" fill="#ffecef"/>
    <text x="28" y="50" class="label">MCP Apps</text>
    <text x="28" y="82" class="note">sandboxed widgets</text>
  </g>
</svg>
