<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Judge suggestion and fix funnel</title>
  <desc id="desc">Funnel showing 879 suggestion records, 730 applied suggestions, 1029 fix application events, and 835 applied fix events.</desc>
  <rect width="1200" height="720" fill="#f7f7fb"/>
  <rect x="44" y="44" width="1112" height="632" rx="18" fill="#fff" stroke="#202020" stroke-width="2"/>
  <text x="76" y="96" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#151515">The judge became an editor</text>
  <text x="76" y="130" font-family="Arial, sans-serif" font-size="17" fill="#555">Suggestions are useful only when they become exact, validated edits.</text>

  <g font-family="Arial, sans-serif" fill="#151515">
    <polygon points="160,190 1040,190 960,285 240,285" fill="#355f8c"/>
    <text x="470" y="247" font-size="42" font-weight="700" fill="#fff">879</text>
    <text x="560" y="243" font-size="20" fill="#fff">suggestion records</text>

    <polygon points="240,320 960,320 900,415 300,415" fill="#3f7f6b"/>
    <text x="475" y="377" font-size="42" font-weight="700" fill="#fff">730</text>
    <text x="560" y="373" font-size="20" fill="#fff">applied from suggestion logs</text>

    <polygon points="190,450 1010,450 940,545 260,545" fill="#9b6a2e"/>
    <text x="455" y="507" font-size="42" font-weight="700" fill="#fff">1,029</text>
    <text x="580" y="503" font-size="20" fill="#fff">fix-application events</text>

    <polygon points="270,580 930,580 875,655 325,655" fill="#b4504b"/>
    <text x="485" y="628" font-size="38" font-weight="700" fill="#fff">835</text>
    <text x="568" y="625" font-size="19" fill="#fff">applied fix events</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#555">
    <text x="76" y="676">High priority suggestions: 662. Medium priority suggestions: 217. The exact-replacement loop applied roughly 81-83% depending on the log layer counted.</text>
  </g>
</svg>
