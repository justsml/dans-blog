<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Candidate model economics for blog translation</title>
  <desc id="desc">A comparison of GPT OSS 120B Nitro, Qwen3 32B Nitro, DeepSeek V4 Flash, Gemini 3 Flash, and Qwen3.6 35B A3B by average cost, median runtime, and candidate success rate.</desc>
  <rect width="1200" height="720" fill="#f7f3ea"/>
  <rect x="42" y="42" width="1116" height="636" rx="18" fill="#fffdf8" stroke="#222" stroke-width="2"/>
  <text x="72" y="95" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#171717">Cheap did not mean weak</text>
  <text x="72" y="130" font-family="Arial, sans-serif" font-size="17" fill="#555">Average candidate cost, median runtime, and candidate-generation success rate from reports/i18n.</text>

  <g font-family="Arial, sans-serif" font-size="15" fill="#444">
    <text x="350" y="178">Avg cost per attempt</text>
    <text x="590" y="178">Median runtime</text>
    <text x="835" y="178">Candidate success</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="17" fill="#171717">
    <text x="72" y="225" font-weight="700">GPT OSS 120B Nitro</text>
    <rect x="350" y="206" width="35" height="20" fill="#2f7d66"/>
    <text x="397" y="223">$0.00118</text>
    <rect x="590" y="206" width="18" height="20" fill="#5b6fbd"/>
    <text x="620" y="223">6.5s</text>
    <rect x="835" y="206" width="235" height="20" fill="#d9902f"/>
    <text x="1082" y="223">67%</text>

    <text x="72" y="295" font-weight="700">Qwen3 32B Nitro</text>
    <rect x="350" y="276" width="84" height="20" fill="#2f7d66"/>
    <text x="446" y="293">$0.00282</text>
    <rect x="590" y="276" width="55" height="20" fill="#5b6fbd"/>
    <text x="657" y="293">19.5s</text>
    <rect x="835" y="276" width="203" height="20" fill="#d9902f"/>
    <text x="1050" y="293">58%</text>

    <text x="72" y="365" font-weight="700">DeepSeek V4 Flash</text>
    <rect x="350" y="346" width="112" height="20" fill="#2f7d66"/>
    <text x="474" y="363">$0.00376</text>
    <rect x="590" y="346" width="167" height="20" fill="#5b6fbd"/>
    <text x="769" y="363">59.3s</text>
    <rect x="835" y="346" width="282" height="20" fill="#d9902f"/>
    <text x="1129" y="363">81%</text>

    <text x="72" y="435" font-weight="700">Gemini 3 Flash Preview</text>
    <rect x="350" y="416" width="480" height="20" fill="#2f7d66"/>
    <text x="842" y="433">$0.01609</text>
    <rect x="590" y="446" width="59" height="20" fill="#5b6fbd"/>
    <text x="661" y="463">20.8s</text>
    <rect x="835" y="446" width="276" height="20" fill="#d9902f"/>
    <text x="1123" y="463">79%</text>

    <text x="72" y="535" font-weight="700">Qwen3.6 35B A3B</text>
    <rect x="350" y="516" width="493" height="20" fill="#2f7d66"/>
    <text x="855" y="533">$0.01651</text>
    <rect x="590" y="546" width="325" height="20" fill="#5b6fbd"/>
    <text x="927" y="563">115.4s</text>
    <rect x="835" y="576" width="235" height="20" fill="#d9902f"/>
    <text x="1082" y="593">67%</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#555">
    <rect x="72" y="622" width="16" height="16" fill="#2f7d66"/><text x="96" y="635">Cost</text>
    <rect x="160" y="622" width="16" height="16" fill="#5b6fbd"/><text x="184" y="635">Runtime</text>
    <rect x="270" y="622" width="16" height="16" fill="#d9902f"/><text x="294" y="635">Success</text>
    <text x="72" y="660">Attempt records are operational records from candidate-run-history.jsonl, not a claim about provider-wide benchmark quality.</text>
  </g>
</svg>
