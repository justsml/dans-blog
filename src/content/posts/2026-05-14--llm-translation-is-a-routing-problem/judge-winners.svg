<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Judge winners by content type</title>
  <desc id="desc">Grouped bars showing article and quiz wins from judge.json selections. Qwen3.6 Plus and DeepSeek V4 Flash dominate articles, while GPT OSS 120B Nitro leads quizzes.</desc>
  <rect width="1200" height="720" fill="#f4f7f2"/>
  <rect x="44" y="44" width="1112" height="632" rx="18" fill="#fff" stroke="#1d1d1d" stroke-width="2"/>
  <text x="76" y="96" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#151515">The winner changed with the job</text>
  <text x="76" y="130" font-family="Arial, sans-serif" font-size="17" fill="#555">Selected translation models from 638 judge.json results, split by article vs quiz content.</text>

  <line x1="330" y1="590" x2="1090" y2="590" stroke="#222" stroke-width="2"/>
  <g stroke="#d7ddd1" stroke-width="1">
    <line x1="330" y1="490" x2="1090" y2="490"/>
    <line x1="330" y1="390" x2="1090" y2="390"/>
    <line x1="330" y1="290" x2="1090" y2="290"/>
    <line x1="330" y1="190" x2="1090" y2="190"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#666">
    <text x="292" y="594">0</text>
    <text x="282" y="494">40</text>
    <text x="282" y="394">80</text>
    <text x="272" y="294">120</text>
    <text x="272" y="194">160</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#151515">
    <text x="76" y="225" font-weight="700">Qwen3.6 Plus</text>
    <rect x="330" y="192" width="530" height="28" fill="#396f5a"/>
    <text x="875" y="212">159 article wins</text>

    <text x="76" y="295" font-weight="700">DeepSeek V4 Flash</text>
    <rect x="330" y="262" width="527" height="28" fill="#396f5a"/>
    <rect x="330" y="298" width="150" height="28" fill="#c97936"/>
    <text x="872" y="282">158 article</text>
    <text x="495" y="319">45 quiz</text>

    <text x="76" y="385" font-weight="700">GPT OSS 120B Nitro</text>
    <rect x="330" y="352" width="263" height="28" fill="#396f5a"/>
    <rect x="330" y="388" width="210" height="28" fill="#c97936"/>
    <text x="608" y="372">79 article</text>
    <text x="555" y="409">63 quiz</text>

    <text x="76" y="475" font-weight="700">Gemini 3 Flash</text>
    <rect x="330" y="442" width="120" height="28" fill="#396f5a"/>
    <rect x="330" y="478" width="10" height="28" fill="#c97936"/>
    <text x="465" y="462">36 article</text>
    <text x="355" y="499">3 quiz</text>

    <text x="76" y="565" font-weight="700">Qwen3 32B Nitro</text>
    <rect x="330" y="532" width="77" height="28" fill="#396f5a"/>
    <rect x="330" y="568" width="20" height="28" fill="#c97936"/>
    <text x="422" y="552">23 article</text>
    <text x="365" y="589">6 quiz</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#555">
    <rect x="76" y="626" width="16" height="16" fill="#396f5a"/><text x="100" y="639">Articles</text>
    <rect x="176" y="626" width="16" height="16" fill="#c97936"/><text x="200" y="639">Quizzes</text>
  </g>
</svg>
