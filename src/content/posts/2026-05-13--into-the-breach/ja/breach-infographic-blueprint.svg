<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
<defs>

<pattern id="small-grid" width="32" height="32" patternUnits="userSpaceOnUse">
  <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#174b63" stroke-width="1"/>
</pattern>
<pattern id="large-grid" width="160" height="160" patternUnits="userSpaceOnUse">
  <rect width="160" height="160" fill="url(#small-grid)"/>
  <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#246a86" stroke-width="2"/>
</pattern>
</defs>
<rect width="1600" height="900" fill="#051923"/>

<rect width="1600" height="900" fill="url(#large-grid)" opacity="0.92"/>
<text x="80" y="95" font-family="Inter, Arial, Helvetica, sans-serif" font-size="78" font-weight="950" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">侵入へ</text>
<text x="85" y="145" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#aeeeff" text-anchor="start" opacity="1" letter-spacing="0">開発者ノートPC：新たな最前線</text>
<text x="1518" y="82" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="28" font-weight="900" fill="#ffe45e" text-anchor="end" opacity="1" letter-spacing="0">現場ノート</text>
<rect x="82" y="230" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="108" y="282" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">1</text>
<text x="172" y="278" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">隔離</text>
<text x="172" y="318" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">DevContainer またはクラウド環境内で実行する。</text>


<rect x="575" y="230" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="601" y="282" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">2</text>
<text x="665" y="278" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">マウント制限</text>
<text x="665" y="318" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">Home や ~/.ssh、~/.aws などは絶対にマウントしない。</text>


<rect x="1068" y="230" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="1094" y="282" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">3</text>
<text x="1158" y="278" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">シークレット範囲指定</text>
<text x="1158" y="318" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">必要な認証情報だけを公開する。</text>


<rect x="82" y="485" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="108" y="537" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">4</text>
<text x="172" y="533" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">トリップワイヤー</text>
<text x="172" y="573" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">.env ファイル、~/.aws/config、CI/CD、パスワードマネージャにカナリートークンを埋め込む。</text>


<rect x="575" y="485" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="601" y="537" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">5</text>
<text x="665" y="533" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">リスク遅延</text>
<text x="665" y="573" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">minimumReleaseAge を使い、パッケージ更新を 1 日以上遅らせる。</text>


<rect x="1068" y="485" width="425" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="1094" y="537" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">6</text>
<text x="1158" y="533" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">迅速に対応</text>
<text x="1158" y="573" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">鍵やパスワードをローテーションし、情報共有し、監視する。</text>

</svg>
