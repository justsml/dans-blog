<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
<defs>

<pattern id="small-grid" width="32" height="32" patternUnits="userSpaceOnUse">
  <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#174b63" stroke-width="1"/>
</pattern>
<pattern id="large-grid" width="160" height="160" patternUnits="userSpaceOnUse">
  <rect width="160" height="160" fill="url(#small-grid)"/>
  <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#246a86" stroke-width="2"/>
</pattern>
</defs>
<rect width="1600" height="900" fill="#051923"/>

<rect width="1600" height="900" fill="url(#large-grid)" opacity="0.92"/>
<text x="80" y="95" font-family="Inter, Arial, Helvetica, sans-serif" font-size="78" font-weight="950" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">في قلب الاختراق</text>
<text x="85" y="145" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#aeeeff" text-anchor="start" opacity="1" letter-spacing="0">أجهزة المطورين: خط الدفاع الأول</text>
<text x="1518" y="82" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="28" font-weight="900" fill="#ffe45e" text-anchor="end" opacity="1" letter-spacing="0">ملاحظات ميدانية</text>
<rect x="82" y="205" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="112" y="258" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">1</text>
<text x="182" y="254" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">العزل</text>
<text x="182" y="298" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="182" dy="0">التشغيل داخل</tspan>
<tspan x="182" dy="34">DevContainers أو بيئات السحابة.</tspan>
</text>


<rect x="846" y="205" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="876" y="258" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">2</text>
<text x="946" y="254" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">تقييد المجلدات الملحقة</text>
<text x="946" y="298" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="946" dy="0">لا تقم أبداً بإلحاق</tspan>
<tspan x="946" dy="34">Home أو ~/.ssh أو ~/.aws، إلخ.</tspan>
</text>


<rect x="82" y="430" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="112" y="483" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">3</text>
<text x="182" y="479" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">تحديد نطاق الأسرار</text>
<text x="182" y="523" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="182" dy="0">اكشف فقط عن بيانات</tspan>
<tspan x="182" dy="34">الاعتماد الضرورية.</tspan>
</text>


<rect x="846" y="430" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="876" y="483" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">4</text>
<text x="946" y="479" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">فخاخ الإنذار</text>
<text x="946" y="514" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="946" dy="0">ازرع رموز Canary في</tspan>
<tspan x="946" dy="31">ملفات .env، و ~/.aws/config، و</tspan>
<tspan x="946" dy="31">CI/CD، ومديري كلمات المرور.</tspan>
</text>


<rect x="82" y="655" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="112" y="708" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">5</text>
<text x="182" y="704" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">تأخير المخاطر</text>
<text x="182" y="748" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="182" dy="0">أخّر تحديثات الحزم ليوم واحد</tspan>
<tspan x="182" dy="34">على الأقل باستخدام minimumReleaseAge.</tspan>
</text>


<rect x="846" y="655" width="672" height="170" rx="6" fill="#082836" stroke="#79e6ff" stroke-width="3" opacity="0.96"/>
<text x="876" y="708" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="48" font-weight="900" fill="#ffe45e" text-anchor="start" opacity="1" letter-spacing="0">6</text>
<text x="946" y="704" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">الاستجابة السريعة</text>
<text x="946" y="748" font-family="Inter, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#aeeeff" text-anchor="start" opacity="1">
<tspan x="946" dy="0">قم بتدوير المفاتيح</tspan>
<tspan x="946" dy="34">وكلمات المرور. تواصل. راقب.</tspan>
</text>

</svg>
