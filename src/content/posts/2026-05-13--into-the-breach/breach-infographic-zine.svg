<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
<defs>

<pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
  <circle cx="3" cy="3" r="2.2" fill="#111111" opacity="0.18"/>
</pattern>
</defs>
<rect width="1600" height="900" fill="#fff1c6"/>

<rect width="1600" height="900" fill="#fff1c6"/>
<rect width="1600" height="900" fill="url(#dots)"/>
<path d="M0,0 L1600,0 L1600,165 L0,230 Z" fill="#111111"/>
<text x="78" y="98" font-family="Inter, Arial, Helvetica, sans-serif" font-size="70" font-weight="950" fill="#fff7df" text-anchor="start" opacity="1" letter-spacing="0">YOUR LAPTOP IS PRODUCTION</text>
<text x="83" y="157" font-family="Inter, Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#f9c74f" text-anchor="start" opacity="1" letter-spacing="0">Stop asking humans to be perfect. Make the blast radius boring.</text>
<rect x="1178" y="38" width="316" height="82" rx="0" fill="#f94144" stroke="#fff7df" stroke-width="4" opacity="1"/>
<text x="1336" y="91" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="31" font-weight="950" fill="#fff7df" text-anchor="middle" opacity="1" letter-spacing="0">ONE BAD CLICK</text>

<g transform="rotate(-1.2 292 340)">
<rect x="90" y="260" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="82" y="252" width="420" height="170" rx="0" fill="#f94144" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="98" y="270" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="114" y="304" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">CONTAINERIZE</text>
<text x="112" y="349" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="112" dy="0">Run tools, installs,</tspan>
<tspan x="112" dy="31">extensions, and agents</tspan>
<tspan x="112" dy="31">inside dev containers.</tspan>
</text>
</g>

<g transform="rotate(1.2 785 340)">
<rect x="583" y="260" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="575" y="252" width="420" height="170" rx="0" fill="#f9c74f" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="591" y="270" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="607" y="304" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">DO NOT MOUNT HOME</text>
<text x="605" y="349" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="605" dy="0">No convenience mounts for</tspan>
<tspan x="605" dy="31">~/.ssh, ~/.aws, or the</tspan>
<tspan x="605" dy="31">whole laptop.</tspan>
</text>
</g>

<g transform="rotate(-1.2 1278 340)">
<rect x="1076" y="260" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="1068" y="252" width="420" height="170" rx="0" fill="#43aa8b" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="1084" y="270" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="1100" y="304" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">SCOPED SECRETS</text>
<text x="1098" y="349" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="1098" dy="0">Only the credentials this</tspan>
<tspan x="1098" dy="31">repo can justify.</tspan>
</text>
</g>

<g transform="rotate(1.2 292 575)">
<rect x="90" y="495" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="82" y="487" width="420" height="170" rx="0" fill="#f94144" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="98" y="505" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="114" y="539" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">CANARY EVERYTHING</text>
<text x="112" y="584" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="112" dy="0">Fake secrets in places an</tspan>
<tspan x="112" dy="31">attacker will inventory.</tspan>
</text>
</g>

<g transform="rotate(-1.2 785 575)">
<rect x="583" y="495" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="575" y="487" width="420" height="170" rx="0" fill="#f9c74f" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="591" y="505" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="607" y="539" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">WATCH PACKAGES</text>
<text x="605" y="584" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="605" dy="0">Use Socket, Snyk, Wiz, and</tspan>
<tspan x="605" dy="31">delay newborn packages.</tspan>
</text>
</g>

<g transform="rotate(1.2 1278 575)">
<rect x="1076" y="495" width="420" height="170" rx="0" fill="#111111" stroke="none" stroke-width="0" opacity="1"/>
<rect x="1068" y="487" width="420" height="170" rx="0" fill="#43aa8b" stroke="#111111" stroke-width="5" opacity="1"/>
<rect x="1084" y="505" width="388" height="46" fill="#fff7df" stroke="#111111" stroke-width="4"/>
<text x="1100" y="539" font-family="DM Mono, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="950" fill="#111111" text-anchor="start" opacity="1" letter-spacing="0">ROTATE FIRST</text>
<text x="1098" y="584" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="780" fill="#111111" text-anchor="start" opacity="1">
<tspan x="1098" dy="0">When the alarm fires,</tspan>
<tspan x="1098" dy="31">revoke before you finish</tspan>
<tspan x="1098" dy="31">the story.</tspan>
</text>
</g>
<path d="M68,795 L1532,755 L1532,842 L68,855 Z" fill="#111111"/>
<text x="105" y="827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="29" font-weight="900" fill="#fff7df" text-anchor="start" opacity="1" letter-spacing="0">Emergency rule: rotate tokens, check persistence, kill sessions, tell someone, write timestamps.</text>

</svg>