<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 880" role="img" aria-labelledby="title desc">
  <title id="title">Docker network-lab score versus total run cost</title>
  <desc id="desc">A neon scatter plot with a logarithmic cost axis. GPT-5.5 Low scores highest at 58 of 63 and costs 10.979 dollars. GPT OSS 120B scores 46 of 63 and costs 0.049 dollars.</desc>
  <defs>
    <linearGradient id="topRule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:34px;font-weight:800}.sub{font-size:17px;fill:#a7bbc6}.axisLabel{font-size:14px;font-weight:720;fill:#c8d7de}.tick{font-size:12px;fill:#8196a1;font-variant-numeric:tabular-nums}.model{font-size:15px;font-weight:780}.metric{font-size:13px;fill:#a7bbc6;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8;shape-rendering:crispEdges}.axis{stroke:#607580;stroke-width:1;shape-rendering:crispEdges}.cheap{fill:#b8ff5f;stroke:#e1ffbd}.premium{fill:#ff6b9d;stroke:#ffc0d4}.mid{fill:#00f5ee;stroke:#a8fffb}.rail{fill:#0e171d;stroke:#263842;stroke-width:1}.frontier{fill:none;stroke:#b8ff5f;stroke-width:2;stroke-dasharray:7 8;opacity:.75}
    </style>
  </defs>
  <rect width="1440" height="880" rx="24" fill="#05080b"/>
  <rect x="32" y="28" width="1376" height="824" rx="20" fill="#0a1015" stroke="#20303a"/>
  <rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#topRule)"/>
  <text class="title" x="72" y="82">Cost changes the winner</text>
  <text class="sub" x="72" y="112">Three-scenario Docker composite · logarithmic cost axis · exact values remain visible in the label rail</text>

  <g transform="translate(150 174)">
    <g>
      <line class="grid" x1="0" y1="456" x2="760" y2="456"/><line class="grid" x1="0" y1="342" x2="760" y2="342"/><line class="grid" x1="0" y1="228" x2="760" y2="228"/><line class="grid" x1="0" y1="114" x2="760" y2="114"/><line class="grid" x1="0" y1="0" x2="760" y2="0"/>
      <line class="grid" x1="0" y1="0" x2="0" y2="456"/><line class="grid" x1="190" y1="0" x2="190" y2="456"/><line class="grid" x1="380" y1="0" x2="380" y2="456"/><line class="grid" x1="570" y1="0" x2="570" y2="456"/><line class="grid" x1="760" y1="0" x2="760" y2="456"/>
      <line class="axis" x1="0" y1="456.5" x2="760" y2="456.5"/><line class="axis" x1=".5" y1="0" x2=".5" y2="456"/>
      <g class="tick" text-anchor="end"><text x="-18" y="460">0.60</text><text x="-18" y="346">0.70</text><text x="-18" y="232">0.80</text><text x="-18" y="118">0.90</text><text x="-18" y="4">1.00</text></g>
      <g class="tick" text-anchor="middle"><text x="0" y="486">$0.05</text><text x="190" y="486">$0.20</text><text x="380" y="486">$1</text><text x="570" y="486">$5</text><text x="760" y="486">$11</text></g>
      <text class="axisLabel" x="380" y="528" text-anchor="middle">Total run cost · logarithmic scale</text>
      <text class="axisLabel" x="-92" y="228" text-anchor="middle" transform="rotate(-90 -92 228)">Composite score · normalized</text>
    </g>
    <path class="frontier" d="M0 308 L760 89"/>
    <circle class="cheap" cx="0" cy="308" r="13" filter="url(#dotGlow)"/>
    <circle class="premium" cx="681" cy="344" r="11"/>
    <circle class="premium" cx="724" cy="380" r="11"/>
    <circle class="premium" cx="739" cy="196" r="12"/>
    <circle class="mid" cx="760" cy="89" r="14" filter="url(#dotGlow)"/>
    <g transform="translate(26 270)"><rect width="252" height="66" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".55"/><text class="model" x="14" y="25" fill="#dfffc0">GPT OSS 120B</text><text class="metric" x="14" y="48">46/63 · $0.049 · 7 evidence</text></g>
  </g>

  <g transform="translate(982 174)">
    <rect class="rail" width="378" height="486" rx="16"/>
    <text class="axisLabel" x="24" y="36">DIRECT LABELS</text>
    <g transform="translate(24 68)"><circle class="mid" cx="8" cy="8" r="7"/><text class="model" x="28" y="13">GPT-5.5 Low</text><text class="metric" x="28" y="36">58/63 · $10.979 · 13 evidence</text></g>
    <g transform="translate(24 146)"><circle class="premium" cx="8" cy="8" r="7"/><text class="model" x="28" y="13">Claude Opus 4.8 Low</text><text class="metric" x="28" y="36">52/63 · $8.938 · 3 evidence</text></g>
    <g transform="translate(24 224)"><circle class="premium" cx="8" cy="8" r="7"/><text class="model" x="28" y="13">GPT-5.5 XHigh</text><text class="metric" x="28" y="36">42/63 · $7.999 · 11 evidence</text></g>
    <g transform="translate(24 302)"><circle class="premium" cx="8" cy="8" r="7"/><text class="model" x="28" y="13">Claude Sonnet 5 Low</text><text class="metric" x="28" y="36">44/63 · $5.055 · 3 evidence</text></g>
    <g transform="translate(24 380)"><circle class="cheap" cx="8" cy="8" r="7"/><text class="model" x="28" y="13">GPT OSS 120B</text><text class="metric" x="28" y="36">46/63 · $0.049 · 7 evidence</text></g>
  </g>

  <g transform="translate(72 744)"><rect width="1296" height="62" rx="14" fill="#0c1718" stroke="#b8ff5f" stroke-opacity=".35"/><text x="22" y="26" font-size="15" font-weight="780" fill="#dfffc0">224× cheaper does not mean “equally capable.”</text><text class="note" x="22" y="48">It means GPT OSS is an unusually strong first-pass route before a selective premium escalation.</text></g>
  <text class="note" x="72" y="834">ExploitHunter Docker-network composite · July 2026 · total cost includes the complete three-scenario route</text>
</svg>
