<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1120" role="img" aria-labelledby="title desc">
  <title id="title">Latest model performance versus cost frontier</title>
  <desc id="desc">A scatter plot of deterministic score against model cost for eleven routes on the same fourteen scenarios. GPT OSS 120B Nitro leads the score at 416 of 425 for 0.006797 dollars. Local Gemma costs zero. Claude Fable 5 is both expensive and low-scoring in this suite.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.axisLabel{font-size:14px;font-weight:740;fill:#c8d7de}.tick{font-size:12px;fill:#8196a1}.model{font-size:14px;font-weight:780}.metric{font-size:12px;fill:#9eb4be;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8}.axis{stroke:#607580}.rail{fill:#0e171d;stroke:#263842}.cyan{fill:#00f5ee;stroke:#a8fffb}.lime{fill:#b8ff5f;stroke:#e1ffbd}.purple{fill:#ad4dff;stroke:#d9b3ff}.pink{fill:#ff6b9d;stroke:#ffc0d4}.frontier{fill:none;stroke:#b8ff5f;stroke-width:2.5;stroke-dasharray:8 8;opacity:.7}
    </style>
  </defs>
  <rect width="1440" height="1120" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="1064" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Performance × cost: the frontier moved</text>
  <text class="sub" x="72" y="116">Same 14-scenario suite · logarithmic spend axis after $0 · direct labels keep every value readable</text>
  <g transform="translate(138 190)">
    <g><line class="grid" x1="0" y1="500" x2="720" y2="500"/><line class="grid" x1="0" y1="400" x2="720" y2="400"/><line class="grid" x1="0" y1="300" x2="720" y2="300"/><line class="grid" x1="0" y1="200" x2="720" y2="200"/><line class="grid" x1="0" y1="100" x2="720" y2="100"/><line class="grid" x1="0" y1="0" x2="720" y2="0"/><line class="grid" x1="0" y1="0" x2="0" y2="500"/><line class="grid" x1="153" y1="0" x2="153" y2="500"/><line class="grid" x1="335" y1="0" x2="335" y2="500"/><line class="grid" x1="515" y1="0" x2="515" y2="500"/><line class="grid" x1="700" y1="0" x2="700" y2="500"/><line class="axis" x1="0" y1="500" x2="720" y2="500"/><line class="axis" x1="0" y1="0" x2="0" y2="500"/></g>
    <g class="tick" text-anchor="end"><text x="-16" y="504">50%</text><text x="-16" y="404">60%</text><text x="-16" y="304">70%</text><text x="-16" y="204">80%</text><text x="-16" y="104">90%</text><text x="-16" y="4">100%</text></g>
    <g class="tick" text-anchor="middle"><text x="0" y="530">$0</text><text x="153" y="530">$0.0023</text><text x="335" y="530">$0.01</text><text x="515" y="530">$0.05</text><text x="700" y="530">$0.30</text></g>
    <text class="axisLabel" x="360" y="572" text-anchor="middle">Model cost · logarithmic after $0</text><text class="axisLabel" x="-88" y="250" text-anchor="middle" transform="rotate(-90 -88 250)">Deterministic performance</text>
    <path class="frontier" d="M0 78 L153 71 L275 21"/>
    <circle class="lime" cx="0" cy="78" r="12" filter="url(#glow)"/><circle class="cyan" cx="153" cy="71" r="11"/><circle class="lime" cx="275" cy="21" r="14" filter="url(#glow)"/>
    <circle class="purple" cx="427" cy="57" r="10"/><circle class="purple" cx="462" cy="73" r="10"/><circle class="purple" cx="485" cy="61" r="10"/><circle class="purple" cx="507" cy="54" r="11"/><circle class="purple" cx="611" cy="47" r="12"/><circle class="purple" cx="620" cy="57" r="10"/><circle class="pink" cx="689" cy="445" r="13"/><circle class="pink" cx="692" cy="54" r="11"/>
    <g transform="translate(290 2)"><rect width="250" height="62" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".55"/><text class="model" x="14" y="24" fill="#dfffc0">GPT OSS 120B Nitro</text><text class="metric" x="14" y="46">416/425 · 12/14 · $0.006797</text></g>
    <g transform="translate(16 92)"><rect width="236" height="62" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".45"/><text class="model" x="14" y="24" fill="#dfffc0">Local Gemma 4 E4B</text><text class="metric" x="14" y="46">392/425 · 10/14 · $0</text></g>
  </g>
  <g transform="translate(918 176)"><rect class="rail" width="442" height="682" rx="16"/><text class="axisLabel" x="24" y="36">DIRECT LABELS · SCORE / PASSES / COST</text>
    <g transform="translate(24 66)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT OSS 120B Nitro</text><text class="metric" x="240" y="12">416 · 12 · $0.006797</text></g>
    <g transform="translate(24 120)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Kimi K3</text><text class="metric" x="240" y="12">405 · 11 · $0.135290</text></g>
    <g transform="translate(24 174)"><circle class="pink" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Claude Sonnet 5</text><text class="metric" x="240" y="12">402 · 12 · $0.280846</text></g>
    <g transform="translate(24 228)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GLM 5.2</text><text class="metric" x="240" y="12">402 · 10 · $0.053724</text></g>
    <g transform="translate(24 282)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Luna</text><text class="metric" x="240" y="12">401 · 11 · $0.026327</text></g>
    <g transform="translate(24 336)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Sol</text><text class="metric" x="240" y="12">401 · 10 · $0.146959</text></g>
    <g transform="translate(24 390)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Grok 4.5</text><text class="metric" x="240" y="12">399 · 11 · $0.044298</text></g>
    <g transform="translate(24 444)"><circle class="cyan" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">DeepSeek V4 Flash</text><text class="metric" x="240" y="12">395 · 10 · $0.002300</text></g>
    <g transform="translate(24 498)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">DeepSeek V4 Pro</text><text class="metric" x="240" y="12">394 · 10 · $0.035513</text></g>
    <g transform="translate(24 552)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Local Gemma 4 E4B</text><text class="metric" x="240" y="12">392 · 10 · $0</text></g>
    <g transform="translate(24 606)"><circle class="pink" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Claude Fable 5</text><text class="metric" x="240" y="12">236 · 1 · $0.272650</text></g>
  </g>
  <g transform="translate(72 914)"><rect width="1296" height="86" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="30" font-size="16" font-weight="800" fill="#dfffc0">The efficient frontier is local Gemma → DeepSeek Flash → GPT OSS.</text><text class="note" x="22" y="55">GPT OSS adds 21 points over Flash for $0.004497 more. Kimi adds 3 points over GLM, but costs $0.081566 more.</text><text class="note" x="22" y="74">Fable’s filters dominate its result: 236/425, 1/14 passed, $0.272650.</text></g>
  <text class="note" x="72" y="1070">ExploitHunter model-tool behavior suite · finalized artifacts and Langfuse traces verified July 17, 2026</text>
</svg>
