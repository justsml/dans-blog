<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">The current cost-quality frontier</title>
  <desc id="desc">Scatter plot comparing judge score and model cost for eight routes on the same hard Juice Shop task. GPT-5.6 Luna, DeepSeek V4 Flash, and Kimi K3 form the strict cost-quality frontier.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.axis{font-size:12px;fill:#a7bbc6;font-variant-numeric:tabular-nums}.model{font-size:14px;font-weight:800}.metric{font-size:12px;fill:#9fb3be;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#29404b;stroke-width:1;stroke-dasharray:3 8;shape-rendering:crispEdges}.frontier{fill:none;stroke:#b8ff5f;stroke-width:2.5;stroke-dasharray:8 7}.lime{fill:#b8ff5f}.cyan{fill:#00f5ee}.purple{fill:#ad4dff}.pink{fill:#ff6b9d}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">The current cost-quality frontier</text><text class="sub" x="72" y="116">Same hard target · judge score × model cost · logarithmic cost axis · every value directly labeled</text>
  <g transform="translate(0 0)">
    <line class="grid" x1="110" y1="170" x2="950" y2="170"/><line class="grid" x1="110" y1="290" x2="950" y2="290"/><line class="grid" x1="110" y1="410" x2="950" y2="410"/><line class="grid" x1="110" y1="530" x2="950" y2="530"/><line class="grid" x1="110" y1="650" x2="950" y2="650"/><line x1="110" y1="170" x2="110" y2="710" stroke="#526872"/><line x1="110" y1="710" x2="950" y2="710" stroke="#526872"/>
    <g class="axis" text-anchor="end"><text x="98" y="174">10</text><text x="98" y="294">9</text><text x="98" y="414">8</text><text x="98" y="534">7</text><text x="98" y="654">6</text><text x="98" y="714">5.5</text></g>
    <g class="axis" text-anchor="middle"><text x="145" y="736">$0.016</text><text x="300" y="736">$0.046</text><text x="430" y="736">$0.086</text><text x="620" y="736">$0.22</text><text x="900" y="736">$1.63</text></g>
    <text class="axis" x="530" y="770" text-anchor="middle" font-weight="800">MODEL COST · LOGARITHMIC SCALE</text><text class="axis" transform="translate(58 440) rotate(-90)" text-anchor="middle" font-weight="800">JUDGE SCORE / 10</text>
    <path class="frontier" d="M145 330 L385 290 L620 170"/>
    <circle class="lime" cx="145" cy="330" r="10" filter="url(#glow)"/><circle class="purple" cx="300" cy="330" r="8"/><circle class="lime" cx="385" cy="290" r="10" filter="url(#glow)"/><circle class="pink" cx="430" cy="710" r="8"/><circle class="purple" cx="500" cy="410" r="8"/><circle class="lime" cx="620" cy="170" r="10" filter="url(#glow)"/><circle class="purple" cx="700" cy="410" r="8"/><circle class="pink" cx="900" cy="170" r="8"/>
    <g transform="translate(122 350)"><rect width="206" height="58" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".65"/><text class="model" x="14" y="23" fill="#dfffc0">GPT-5.6 Luna</text><text class="metric" x="14" y="44">8.67/10 · $0.016304</text></g>
    <g transform="translate(270 216)"><rect width="220" height="58" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".65"/><text class="model" x="14" y="23" fill="#dfffc0">DeepSeek V4 Flash</text><text class="metric" x="14" y="44">9.0/10 · $0.068251</text></g>
    <path d="M620 170 L645 154" fill="none" stroke="#b8ff5f" stroke-width="1.5"/>
    <g transform="translate(645 126)"><rect width="210" height="58" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".65"/><text class="model" x="14" y="23" fill="#dfffc0">Kimi K3</text><text class="metric" x="14" y="44">10.0/10 · $0.220184</text></g>
  </g>
  <g transform="translate(990 156)">
    <rect width="350" height="574" rx="16" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="34" font-size="13" font-weight="850" fill="#b5c8d1">DIRECT LABELS · SCORE / COST / RUNTIME</text>
    <g transform="translate(24 74)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Kimi K3</text><text class="metric" x="326" y="12" text-anchor="end">10 · $0.220184 · 223s</text></g>
    <g transform="translate(24 134)"><circle class="pink" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Claude Opus 4.8</text><text class="metric" x="326" y="12" text-anchor="end">10 · $1.633301 · 116s</text></g>
    <g transform="translate(24 194)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">DeepSeek V4 Flash</text><text class="metric" x="326" y="12" text-anchor="end">9 · $0.068251 · 544s</text></g>
    <g transform="translate(24 254)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Luna</text><text class="metric" x="326" y="12" text-anchor="end">8.67 · $0.016304 · 52s</text></g>
    <g transform="translate(24 314)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT OSS 120B</text><text class="metric" x="326" y="12" text-anchor="end">8.67 · $0.046249 · 61s</text></g>
    <g transform="translate(24 374)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Terra</text><text class="metric" x="326" y="12" text-anchor="end">8 · $0.124046 · 108s</text></g>
    <g transform="translate(24 434)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Sol</text><text class="metric" x="326" y="12" text-anchor="end">8 · $0.368514 · 230s</text></g>
    <g transform="translate(24 494)"><circle class="pink" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Qwen 3.6 Flash</text><text class="metric" x="326" y="12" text-anchor="end">5.5 · $0.085678 · 97s</text></g>
  </g>
  <g transform="translate(72 798)"><rect width="1296" height="58" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="25" font-size="15" font-weight="820" fill="#dfffc0">Only Luna, DeepSeek, and Kimi survive the strict cost-quality test.</text><text class="note" x="22" y="46">Opus remains useful when speed matters: it matches Kimi's score and finishes about 1.9× faster.</text></g>
  <text class="note" x="72" y="886">ExploitHunter hard Juice Shop · selected tested route per model · model cost excludes judge spend</text>
</svg>
