<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <title id="title">Average model performance versus cost frontier</title>
  <desc id="desc">A logarithmic scatter plot comparing seven model routes by average deterministic score and average model cost. DeepSeek V4 Flash and GPT-5.6 Sol form the cost-performance frontier.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.axisLabel{font-size:14px;font-weight:740;fill:#c8d7de}.tick{font-size:12px;fill:#8196a1}.model{font-size:14px;font-weight:790}.metric{font-size:12px;fill:#9eb4be;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8;shape-rendering:crispEdges}.axis{stroke:#607580;shape-rendering:crispEdges}.rail{fill:#0e171d;stroke:#263842}.cyan{fill:#00f5ee;stroke:#a8fffb}.lime{fill:#b8ff5f;stroke:#e1ffbd}.purple{fill:#ad4dff;stroke:#d9b3ff}.pink{fill:#ff6b9d;stroke:#ffc0d4}.frontier{fill:none;stroke:#b8ff5f;stroke-width:2.5;stroke-dasharray:8 8;opacity:.75}</style>
  </defs>
  <rect width="1440" height="940" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="884" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">The efficient frontier is brutally small</text><text class="sub" x="72" y="116">Average full-suite score × model cost · logarithmic cost axis · every value remains directly labeled</text>
  <g transform="translate(138 190)">
    <g><line class="grid" x1="0" y1="450" x2="720" y2="450"/><line class="grid" x1="0" y1="360" x2="720" y2="360"/><line class="grid" x1="0" y1="270" x2="720" y2="270"/><line class="grid" x1="0" y1="180" x2="720" y2="180"/><line class="grid" x1="0" y1="90" x2="720" y2="90"/><line class="grid" x1="0" y1="0" x2="720" y2="0"/><line class="grid" x1="0" y1="0" x2="0" y2="450"/><line class="grid" x1="260" y1="0" x2="260" y2="450"/><line class="grid" x1="430" y1="0" x2="430" y2="450"/><line class="grid" x1="570" y1="0" x2="570" y2="450"/><line class="grid" x1="700" y1="0" x2="700" y2="450"/><line class="axis" x1="0" y1="450" x2="720" y2="450"/><line class="axis" x1="0" y1="0" x2="0" y2="450"/></g>
    <g class="tick" text-anchor="end"><text x="-16" y="454">93%</text><text x="-16" y="364">94%</text><text x="-16" y="274">95%</text><text x="-16" y="184">96%</text><text x="-16" y="94">97%</text><text x="-16" y="4">98%</text></g>
    <g class="tick" text-anchor="middle"><text x="0" y="480">$0.0047</text><text x="260" y="480">$0.05</text><text x="430" y="480">$0.20</text><text x="570" y="480">$0.70</text><text x="700" y="480">$2.30</text></g>
    <text class="axisLabel" x="360" y="522" text-anchor="middle">Average model cost · logarithmic scale</text><text class="axisLabel" x="-88" y="225" text-anchor="middle" transform="rotate(-90 -88 225)">Average deterministic performance</text>
    <path class="frontier" d="M0 130 L519 46"/>
    <circle class="lime" cx="0" cy="130" r="14" filter="url(#glow)"/><circle class="lime" cx="519" cy="46" r="14" filter="url(#glow)"/><circle class="cyan" cx="536" cy="110" r="11"/><circle class="purple" cx="412" cy="230" r="10"/><circle class="purple" cx="375" cy="349" r="10"/><circle class="pink" cx="700" cy="371" r="12"/><circle class="purple" cx="464" cy="406" r="10"/>
    <g transform="translate(18 100)"><rect width="246" height="62" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".55"/><text class="model" x="14" y="24" fill="#dfffc0">DeepSeek V4 Flash</text><text class="metric" x="14" y="46">410.3/425 · $0.004735</text></g>
    <g transform="translate(486 -18)"><rect width="224" height="62" rx="10" fill="#101c18" stroke="#b8ff5f" stroke-opacity=".55"/><text class="model" x="14" y="24" fill="#dfffc0">GPT-5.6 Sol</text><text class="metric" x="14" y="46">414.3/425 · $0.465044</text></g>
  </g>
  <g transform="translate(918 176)"><rect class="rail" width="442" height="520" rx="16"/><text class="axisLabel" x="24" y="36">DIRECT LABELS · SCORE / PASSES / COST</text>
    <g transform="translate(24 72)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Sol</text><text class="metric" x="220" y="12">414.3 · 12.67 · $0.465044</text></g>
    <g transform="translate(24 132)"><circle class="cyan" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Gemini 3.5 Flash</text><text class="metric" x="220" y="12">411.3 · 11.67 · $0.538653</text></g>
    <g transform="translate(24 192)"><circle class="lime" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">DeepSeek V4 Flash</text><text class="metric" x="220" y="12">410.3 · 10.67 · $0.004735</text></g>
    <g transform="translate(24 252)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GPT-5.6 Terra</text><text class="metric" x="220" y="12">405.7 · 12.00 · $0.180501</text></g>
    <g transform="translate(24 312)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">DeepSeek V4 Pro</text><text class="metric" x="220" y="12">400.0 · 10.33 · $0.130401</text></g>
    <g transform="translate(24 372)"><circle class="pink" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">Kimi K3 Native</text><text class="metric" x="220" y="12">399.0 · 10.33 · $2.303873</text></g>
    <g transform="translate(24 432)"><circle class="purple" cx="7" cy="7" r="6"/><text class="model" x="26" y="12">GLM 5.2</text><text class="metric" x="220" y="12">397.3 · 10.33 · $0.287614</text></g>
  </g>
  <g transform="translate(72 770)"><rect width="1296" height="76" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="29" font-size="16" font-weight="800" fill="#dfffc0">Only Flash and Sol survive the strict cost-performance test.</text><text class="note" x="22" y="54">Flash costs about 1% of Sol and trails by four points. Every other route costs more than Flash while scoring lower.</text></g>
  <text class="note" x="72" y="884">ExploitHunter model-tool behavior suite · three fixed-configuration full runs per route · verified July 17, 2026</text>
</svg>
