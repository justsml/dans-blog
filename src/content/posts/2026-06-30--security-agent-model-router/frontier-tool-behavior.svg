<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Kimi wins on cost, Opus wins on speed</title>
  <desc id="desc">Kimi K3 and Claude Opus 4.8 both score ten of ten on the same hard Juice Shop task and use eight tool calls. Kimi costs 0.220184 dollars and takes 223.4 seconds. Opus costs 1.633301 dollars and takes 115.9 seconds.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="kimi" x1="0" x2="1"><stop stop-color="#7e2ce0"/><stop offset="1" stop-color="#c35bff"/></linearGradient>
    <linearGradient id="opus" x1="0" x2="1"><stop stop-color="#089c9a"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.eyebrow{font-size:12px;font-weight:850;letter-spacing:1.2px;fill:#9db2bd}.model{font-size:26px;font-weight:840}.big{font-size:35px;font-weight:850;font-variant-numeric:tabular-nums}.metric{font-size:15px;fill:#b4c5cd}.small{font-size:12px;fill:#91a7b2}.note{font-size:13px;fill:#91a7b2}.card{fill:#0d171d;stroke:#2a3c47}.chip{fill:#101920;stroke:#293e49}.track{fill:#132129}.purple{fill:#d9b3ff}.cyan{fill:#9cfff9}.lime{fill:#dfffc0}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Kimi wins on cost. Opus wins on speed.</text><text class="sub" x="72" y="116">Same hard target · both score 10/10 · both use eight tool calls</text>
  <g transform="translate(72 154)">
    <rect class="card" width="620" height="420" rx="18"/><g transform="translate(30 32)"><text class="eyebrow">TOP-SCORE VALUE</text><text class="model" y="44" fill="#d9b3ff">Kimi K3</text><text class="big purple" y="104">10.0 / 10</text><text class="metric" y="132">full judge score on the hard browser task</text><rect class="track" y="158" width="560" height="18" rx="9"/><rect y="158" width="560" height="18" rx="9" fill="url(#kimi)" filter="url(#glow)"/>
      <g transform="translate(0 222)"><text class="eyebrow">MODEL COST</text><text class="big" y="44">$0.220184</text></g><g transform="translate(292 222)"><text class="eyebrow">RUNTIME</text><text class="big" y="44">223.4s</text></g>
      <g transform="translate(0 326)"><text class="eyebrow">TOOL CALLS</text><text x="0" y="36" font-size="25" font-weight="840">8</text></g><g transform="translate(292 326)"><text class="eyebrow">ADVANTAGE</text><text x="0" y="36" font-size="19" font-weight="820" fill="#dfffc0">7.4× cheaper</text></g>
    </g>
    <g transform="translate(676 0)"><rect class="card" width="620" height="420" rx="18"/><g transform="translate(30 32)"><text class="eyebrow">TOP-SCORE SPEED</text><text class="model" y="44" fill="#9cfff9">Claude Opus 4.8</text><text class="big cyan" y="104">10.0 / 10</text><text class="metric" y="132">full judge score on the hard browser task</text><rect class="track" y="158" width="560" height="18" rx="9"/><rect y="158" width="560" height="18" rx="9" fill="url(#opus)" filter="url(#glow)"/>
      <g transform="translate(0 222)"><text class="eyebrow">MODEL COST</text><text class="big" y="44">$1.633301</text></g><g transform="translate(292 222)"><text class="eyebrow">RUNTIME</text><text class="big" y="44">115.9s</text></g>
      <g transform="translate(0 326)"><text class="eyebrow">TOOL CALLS</text><text x="0" y="36" font-size="25" font-weight="840">8</text></g><g transform="translate(292 326)"><text class="eyebrow">ADVANTAGE</text><text x="0" y="36" font-size="19" font-weight="820" fill="#dfffc0">1.9× faster</text></g>
    </g>
  </g>
  </g>
  <g transform="translate(72 610)">
    <g><rect class="chip" width="300" height="112" rx="14"/><text class="eyebrow" x="18" y="28">REPEATED EFFICIENCY</text><text x="18" y="57" font-size="17" font-weight="820" fill="#dfffc0">GPT-5.6 Luna</text><text class="small" x="18" y="84">8.67/10 · $0.016304 · 52.2s</text></g>
    <g transform="translate(324)"><rect class="chip" width="300" height="112" rx="14"/><text class="eyebrow" x="18" y="28">LOW-COST ALTERNATE</text><text x="18" y="57" font-size="17" font-weight="820" fill="#9cfff9">GPT OSS 120B</text><text class="small" x="18" y="84">8.67/10 · $0.046249 · 60.6s</text></g>
    <g transform="translate(648)"><rect class="chip" width="300" height="112" rx="14"/><text class="eyebrow" x="18" y="28">QUALITY STEP-UP</text><text x="18" y="57" font-size="17" font-weight="820" fill="#9cfff9">DeepSeek V4 Flash</text><text class="small" x="18" y="84">9/10 · $0.068251 · 543.5s</text></g>
    <g transform="translate(972)"><rect class="chip" width="300" height="112" rx="14"/><text class="eyebrow" x="18" y="28">FAMILY VALUE</text><text x="18" y="57" font-size="17" font-weight="820" fill="#dfffc0">GPT-5.6 Terra</text><text class="small" x="18" y="84">Same 8/10 as Sol · 66% cheaper</text></g>
  </g>
  <g transform="translate(72 758)"><rect width="1296" height="72" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="29" font-size="15" font-weight="820" fill="#dfffc0">At the top, the routing choice is brutally simple.</text><text class="note" x="22" y="52">Choose Kimi when cost matters. Choose Opus when saving about 108 seconds is worth another $1.41.</text></g>
  <text class="note" x="72" y="880">ExploitHunter hard Juice Shop · eligible browser runs · model cost excludes judge spend</text>
</svg>
