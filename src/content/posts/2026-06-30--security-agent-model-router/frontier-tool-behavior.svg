<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <title id="title">Kimi K3 versus GLM 5.2 on performance and cost</title>
  <desc id="desc">A direct comparison on the same fourteen security tool-behavior scenarios. Kimi K3 scores 405 of 425 and passes 11 scenarios for 0.135290 dollars. GLM 5.2 scores 402 and passes 10 for 0.053724 dollars.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="kimi" x1="0" x2="1"><stop stop-color="#6d28aa"/><stop offset="1" stop-color="#ad4dff"/></linearGradient>
    <linearGradient id="glm" x1="0" x2="1"><stop stop-color="#078b88"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.model{font-size:28px;font-weight:830}.eyebrow{font-size:12px;font-weight:820;letter-spacing:1.15px;fill:#9eb4be}.metric{font-size:15px;font-weight:760;fill:#cbdbe2}.big{font-size:34px;font-weight:860;font-variant-numeric:tabular-nums}.small{font-size:13px;fill:#91a7b2}.panel{fill:#0d151b;stroke:#293b45}.track{fill:#111d24}.kimi{fill:url(#kimi)}.glm{fill:url(#glm)}.lime{fill:#dfffc0}.cyan{fill:#9cfff9}.purple{fill:#d9b3ff}.note{font-size:13px;fill:#91a7b2}.chip{fill:#101a20;stroke:#2b3e49}
    </style>
  </defs>
  <rect width="1440" height="940" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="884" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Kimi beats GLM on quality. GLM beats Kimi on cost.</text>
  <text class="sub" x="72" y="116">A direct head-to-head inside the same 14-scenario security-tool lane</text>
  <g transform="translate(72 170)">
    <rect class="panel" width="622" height="488" rx="18"/><rect class="panel" x="646" width="622" height="488" rx="18"/>
    <g transform="translate(30 34)"><text class="eyebrow">QUALITY LEAD</text><text class="model" y="42" fill="#d9b3ff">Kimi K3</text><text class="big purple" y="100">405 / 425</text><text class="metric" y="128">95.29% deterministic performance</text><rect class="track" y="154" width="540" height="18" rx="9"/><rect class="kimi" y="154" width="514" height="18" rx="9" filter="url(#glow)"/>
      <g transform="translate(0 214)"><text class="eyebrow">SCENARIOS PASSED</text><text class="big" y="42">11 / 14</text></g><g transform="translate(270 214)"><text class="eyebrow">JUDGE SCORE</text><text class="big" y="42">295 / 308</text></g>
      <g transform="translate(0 304)"><text class="eyebrow">GUARD FAILURES</text><text class="big" y="42">3</text></g><g transform="translate(270 304)"><text class="eyebrow">MODEL COST</text><text class="big" y="42">$0.135290</text></g>
      <text class="small" y="430">+3 deterministic points · +1 pass · +1 judge point · 2 fewer guard failures</text>
    </g>
    <g transform="translate(676 34)"><text class="eyebrow">COST LEAD</text><text class="model" y="42" fill="#9cfff9">GLM 5.2</text><text class="big cyan" y="100">402 / 425</text><text class="metric" y="128">94.59% deterministic performance</text><rect class="track" y="154" width="540" height="18" rx="9"/><rect class="glm" y="154" width="510" height="18" rx="9" filter="url(#glow)"/>
      <g transform="translate(0 214)"><text class="eyebrow">SCENARIOS PASSED</text><text class="big" y="42">10 / 14</text></g><g transform="translate(270 214)"><text class="eyebrow">JUDGE SCORE</text><text class="big" y="42">294 / 308</text></g>
      <g transform="translate(0 304)"><text class="eyebrow">GUARD FAILURES</text><text class="big" y="42">5</text></g><g transform="translate(270 304)"><text class="eyebrow">MODEL COST</text><text class="big" y="42">$0.053724</text></g>
      <text class="small" y="430">$0.081566 less · 60.3% lower spend · only 0.71 percentage points behind</text>
    </g>
  </g>
  <g transform="translate(72 690)">
    <rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">OVERALL LEADER</text><text x="18" y="55" font-size="16" font-weight="800" fill="#dfffc0">GPT OSS 120B Nitro</text><text class="small" x="18" y="80">416/425 · 12/14 · $0.006797</text>
    <g transform="translate(324)"><rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">HOSTED PRICE LEAD</text><text x="18" y="55" font-size="16" font-weight="800" fill="#9cfff9">DeepSeek V4 Flash</text><text class="small" x="18" y="80">395/425 · 10/14 · $0.002300</text></g>
    <g transform="translate(648)"><rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">ZERO-COST ROUTE</text><text x="18" y="55" font-size="16" font-weight="800" fill="#dfffc0">Local Gemma 4 E4B</text><text class="small" x="18" y="80">392/425 · 10/14 · $0</text></g>
    <g transform="translate(972)"><rect class="chip" width="296" height="104" rx="14"/><text class="eyebrow" x="18" y="27">FILTER FAILURE</text><text x="18" y="55" font-size="16" font-weight="800" fill="#ffb1ca">Claude Fable 5</text><text class="small" x="18" y="80">236/425 · 1/14 · $0.272650</text></g>
  </g>
  <text class="note" x="72" y="842">On offline archive recovery, the order flips again: Kimi 10/10 for $0.007856; GLM 9/10 for $0.009488. Route by task, not logo.</text>
  <text class="note" x="72" y="884">ExploitHunter model-tool behavior suite · finalized artifacts and Langfuse traces verified July 17, 2026</text>
</svg>
