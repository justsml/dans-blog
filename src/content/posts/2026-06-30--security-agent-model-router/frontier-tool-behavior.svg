<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <title id="title">Kimi K3 versus GLM 5.2 average performance and cost</title>
  <desc id="desc">Kimi K3 Native averages 399 of 425 at 2.303873 dollars. GLM 5.2 averages 397.3 at 0.287614 dollars. Kimi is more consistent and scores slightly higher; GLM costs about eight times less.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="kimi" x1="0" x2="1"><stop stop-color="#6d28aa"/><stop offset="1" stop-color="#ad4dff"/></linearGradient><linearGradient id="glm" x1="0" x2="1"><stop stop-color="#078b88"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.model{font-size:28px;font-weight:830}.eyebrow{font-size:12px;font-weight:820;letter-spacing:1.15px;fill:#9eb4be}.metric{font-size:15px;font-weight:760;fill:#cbdbe2}.big{font-size:34px;font-weight:860;font-variant-numeric:tabular-nums}.small{font-size:13px;fill:#91a7b2}.panel{fill:#0d151b;stroke:#293b45}.track{fill:#111d24}.kimi{fill:url(#kimi)}.glm{fill:url(#glm)}.lime{fill:#dfffc0}.cyan{fill:#9cfff9}.purple{fill:#d9b3ff}.note{font-size:13px;fill:#91a7b2}.chip{fill:#101a20;stroke:#2b3e49}</style>
  </defs>
  <rect width="1440" height="940" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="884" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Kimi wins narrowly. GLM costs about 8× less.</text><text class="sub" x="72" y="116">Average performance, stability, safety behavior, and model cost in the same 14-scenario lane</text>
  <g transform="translate(72 170)">
    <rect class="panel" width="622" height="488" rx="18"/><rect class="panel" x="646" width="622" height="488" rx="18"/>
    <g transform="translate(30 34)"><text class="eyebrow">QUALITY + STABILITY LEAD</text><text class="model" y="42" fill="#d9b3ff">Kimi K3 Native</text><text class="big purple" y="100">399.0 / 425</text><text class="metric" y="128">93.88% average deterministic performance</text><rect class="track" y="154" width="540" height="18" rx="9"/><rect class="kimi" y="154" width="507" height="18" rx="9" filter="url(#glow)"/>
      <g transform="translate(0 214)"><text class="eyebrow">AVERAGE PASSED</text><text class="big" y="42">10.33 / 14</text></g><g transform="translate(270 214)"><text class="eyebrow">AVERAGE JUDGE</text><text class="big" y="42">300.0 / 308</text></g>
      <g transform="translate(0 304)"><text class="eyebrow">SCORE SPREAD</text><text class="big" y="42">±2.4</text></g><g transform="translate(270 304)"><text class="eyebrow">AVERAGE COST</text><text class="big" y="42">$2.303873</text></g>
      <text class="small" y="430">+1.7 score · +2.7 judge points · tighter spread · one fewer guard failure on average</text>
    </g>
    <g transform="translate(676 34)"><text class="eyebrow">COST LEAD</text><text class="model" y="42" fill="#9cfff9">GLM 5.2</text><text class="big cyan" y="100">397.3 / 425</text><text class="metric" y="128">93.49% average deterministic performance</text><rect class="track" y="154" width="540" height="18" rx="9"/><rect class="glm" y="154" width="505" height="18" rx="9" filter="url(#glow)"/>
      <g transform="translate(0 214)"><text class="eyebrow">AVERAGE PASSED</text><text class="big" y="42">10.33 / 14</text></g><g transform="translate(270 214)"><text class="eyebrow">AVERAGE JUDGE</text><text class="big" y="42">297.3 / 308</text></g>
      <g transform="translate(0 304)"><text class="eyebrow">SCORE SPREAD</text><text class="big" y="42">±10.3</text></g><g transform="translate(270 304)"><text class="eyebrow">AVERAGE COST</text><text class="big" y="42">$0.287614</text></g>
      <text class="small" y="430">$2.016259 less · 87.5% lower spend · identical average scenario pass count</text>
    </g>
  </g>
  <g transform="translate(72 690)">
    <rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">AVERAGE SCORE LEAD</text><text x="18" y="55" font-size="16" font-weight="800" fill="#dfffc0">GPT-5.6 Sol</text><text class="small" x="18" y="80">414.3/425 · 12.67/14 · $0.465044</text>
    <g transform="translate(324)"><rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">CONSISTENT HIGH SCORE</text><text x="18" y="55" font-size="16" font-weight="800" fill="#9cfff9">Gemini 3.5 Flash</text><text class="small" x="18" y="80">411.3/425 · ±2.1 · $0.538653</text></g>
    <g transform="translate(648)"><rect class="chip" width="300" height="104" rx="14"/><text class="eyebrow" x="18" y="27">COST-PERFORMANCE</text><text x="18" y="55" font-size="16" font-weight="800" fill="#dfffc0">DeepSeek V4 Flash</text><text class="small" x="18" y="80">410.3/425 · 10.67/14 · $0.004735</text></g>
    <g transform="translate(972)"><rect class="chip" width="296" height="104" rx="14"/><text class="eyebrow" x="18" y="27">BALANCED ROUTE</text><text x="18" y="55" font-size="16" font-weight="800" fill="#9cfff9">GPT-5.6 Terra</text><text class="small" x="18" y="80">405.7/425 · 12/14 · $0.180501</text></g>
  </g>
  <text class="note" x="72" y="842">On offline archive recovery, Kimi still wins 10/10 to GLM’s 9/10. On the broader suite, the quality gap is small and the cost gap is not.</text>
  <text class="note" x="72" y="884">ExploitHunter model-tool behavior suite · three fixed-configuration full runs per route · verified July 17, 2026</text>
</svg>
