<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Five model routes compared on the same fourteen security tool-behavior scenarios</title>
  <desc id="desc">DeepSeek V4 Flash scored 404 of 425 for 0.002551 dollars. GLM 5.2 scored 402 for 0.053724 dollars. DeepSeek V4 Pro scored 401 for 0.011827 dollars. Local Gemma 4 E4B scored 392 with zero candidate API cost. Kimi K3 Low scored 384 for an estimated 0.215106 dollars.</desc>
  <defs>
    <linearGradient id="topRule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="scoreBar" x1="0" x2="1"><stop stop-color="#007b79"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <linearGradient id="localBar" x1="0" x2="1"><stop stop-color="#568f22"/><stop offset="1" stop-color="#b8ff5f"/></linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:34px;font-weight:800}.sub{font-size:17px;fill:#a7bbc6}.panel{font-size:13px;font-weight:800;letter-spacing:1.2px;fill:#9eb4be}.label{font-size:17px;font-weight:740}.value{font-size:14px;font-weight:760;font-variant-numeric:tabular-nums}.tick{font-size:12px;fill:#8196a1;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8;shape-rendering:crispEdges}.track{fill:#111b22}.score{fill:url(#scoreBar)}.local{fill:url(#localBar)}.costLine{stroke:#ff6b9d;stroke-width:4;stroke-linecap:round}.costDot{fill:#ff6b9d}.zeroDot{fill:#b8ff5f}.chip{fill:#101a20;stroke:#2b3c46}.chipLocal{fill:#b8ff5f;fill-opacity:.1;stroke:#b8ff5f;stroke-opacity:.45}
    </style>
  </defs>
  <rect width="1440" height="900" rx="24" fill="#05080b"/>
  <rect x="32" y="28" width="1376" height="844" rx="20" fill="#0a1015" stroke="#20303a"/>
  <rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#topRule)"/>
  <text class="title" x="72" y="82">Flash leads. Local Gemma changes the economics.</text>
  <text class="sub" x="72" y="112">Same 14 security scenarios · deterministic 425-point scorer · candidate cost shown separately</text>

  <text class="panel" x="72" y="176">DETERMINISTIC SCORE</text>
  <text class="panel" x="866" y="176">CANDIDATE COST · LOG SCALE</text>

  <g transform="translate(310 212)">
    <g class="grid"><line x1="0" y1="0" x2="0" y2="400"/><line x1="132" y1="0" x2="132" y2="400"/><line x1="264" y1="0" x2="264" y2="400"/><line x1="396" y1="0" x2="396" y2="400"/><line x1="528" y1="0" x2="528" y2="400"/></g>
    <g class="tick" text-anchor="middle"><text x="0" y="430">360</text><text x="132" y="430">375</text><text x="264" y="430">390</text><text x="396" y="430">405</text><text x="528" y="430">420</text></g>

    <g transform="translate(0 8)"><text class="label" x="-32" y="31" text-anchor="end">DeepSeek V4 Flash</text><rect class="track" width="528" height="44" rx="8"/><rect class="score" width="387" height="44" rx="8" filter="url(#glow)"/><text class="value" x="403" y="29">404 / 425 · 10/14</text></g>
    <g transform="translate(0 84)"><text class="label" x="-32" y="31" text-anchor="end">GLM 5.2</text><rect class="track" width="528" height="44" rx="8"/><rect class="score" width="370" height="44" rx="8"/><text class="value" x="386" y="29">402 / 425 · 10/14</text></g>
    <g transform="translate(0 160)"><text class="label" x="-32" y="31" text-anchor="end">DeepSeek V4 Pro</text><rect class="track" width="528" height="44" rx="8"/><rect class="score" width="361" height="44" rx="8"/><text class="value" x="377" y="29">401 / 425 · 11/14</text></g>
    <g transform="translate(0 236)"><text class="label" x="-32" y="31" text-anchor="end">Local Gemma 4 E4B</text><rect class="track" width="528" height="44" rx="8"/><rect class="local" width="282" height="44" rx="8"/><text class="value" x="298" y="29" fill="#dfffc0">392 / 425 · 10/14</text></g>
    <g transform="translate(0 312)"><text class="label" x="-32" y="31" text-anchor="end">Kimi K3 Low</text><rect class="track" width="528" height="44" rx="8"/><rect class="score" width="211" height="44" rx="8"/><text class="value" x="227" y="29">384 / 425 · 10/14</text></g>
  </g>

  <g transform="translate(866 212)">
    <g class="grid"><line x1="0" y1="0" x2="0" y2="400"/><line x1="145" y1="0" x2="145" y2="400"/><line x1="290" y1="0" x2="290" y2="400"/><line x1="435" y1="0" x2="435" y2="400"/></g>
    <g class="tick" text-anchor="middle"><text x="0" y="430">$0</text><text x="145" y="430">$0.002</text><text x="290" y="430">$0.02</text><text x="435" y="430">$0.20</text></g>
    <g transform="translate(0 30)"><line class="costLine" x1="0" x2="160"/><circle class="costDot" cx="160" r="7"/><text class="value" x="176" y="5">$0.002551 exact</text></g>
    <g transform="translate(0 106)"><line class="costLine" x1="0" x2="346"/><circle class="costDot" cx="346" r="7"/><text class="value" x="362" y="5">$0.053724 exact</text></g>
    <g transform="translate(0 182)"><line class="costLine" x1="0" x2="257"/><circle class="costDot" cx="257" r="7"/><text class="value" x="273" y="5">$0.011827 exact</text></g>
    <g transform="translate(0 258)"><circle class="zeroDot" cx="0" r="8" filter="url(#glow)"/><text class="value" x="18" y="5" fill="#dfffc0">$0 candidate API</text></g>
    <g transform="translate(0 334)"><line class="costLine" x1="0" x2="439"/><circle class="costDot" cx="439" r="7"/><text class="value" x="439" y="-14" text-anchor="end">$0.2151 estimated</text></g>
  </g>

  <g transform="translate(72 700)">
    <rect class="chip" width="390" height="74" rx="14"/><text x="20" y="29" font-size="15" font-weight="780" fill="#9cfff9">Highest deterministic score</text><text class="note" x="20" y="53">Flash · 404/425 · $0.002551</text>
    <g transform="translate(420)"><rect class="chip" width="390" height="74" rx="14"/><text x="20" y="29" font-size="15" font-weight="780" fill="#ffb1ca">Most scenarios passed</text><text class="note" x="20" y="53">DeepSeek Pro · 11/14</text></g>
    <g transform="translate(840)"><rect class="chipLocal" width="456" height="74" rx="14"/><text x="20" y="29" font-size="15" font-weight="780" fill="#dfffc0">Local efficiency winner</text><text class="note" x="20" y="53">Gemma · 392/425 · no candidate API bill</text></g>
  </g>
  <text class="note" x="72" y="842">Candidate generation cost only; judge spend excluded · hosted suite July 16 plus local Gemma completion July 17, 2026</text>
</svg>
