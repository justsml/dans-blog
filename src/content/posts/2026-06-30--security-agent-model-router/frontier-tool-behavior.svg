<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">DeepSeek Flash won the 14-scenario tool-behavior score at the lowest candidate cost</title>
  <desc id="desc">Two-panel comparison of four hosted models. DeepSeek V4 Flash scored 404 of 425 for 0.002551 dollars. GLM 5.2 scored 402 for 0.053724 dollars. DeepSeek V4 Pro scored 401 for 0.011827 dollars. Kimi K3 Low scored 384 for an estimated 0.215106 dollars. All models ran the same 14 scenarios.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f4f0e8; }
    .muted { fill: #a9a59d; }
    .grid { stroke: #3b3935; stroke-width: .75; shape-rendering: crispEdges; }
    .bar { fill: #78736b; }
    .focus { fill: #f5b942; }
    .cost { fill: #72c7b4; }
    .label { font-size: 15px; font-weight: 650; }
    .value { font-size: 14px; font-variant-numeric: tabular-nums; }
    .tick { font-size: 11px; font-variant-numeric: tabular-nums; }
    .note { font-size: 11px; }
  </style>
  <rect width="1000" height="560" rx="18" fill="#1d1c1a"/>

  <text x="48" y="54" font-size="25" font-weight="760">Flash won by 2 points—and cost 21× less than GLM</text>
  <text x="48" y="82" class="muted" font-size="14">Same 14 security tool-behavior scenarios · deterministic 425-point scorer · July 16, 2026</text>

  <text x="48" y="128" font-size="14" font-weight="720">DETERMINISTIC SCORE</text>
  <text x="582" y="128" font-size="14" font-weight="720">CANDIDATE COST · LOG SCALE</text>

  <line x1="210.5" y1="150" x2="210.5" y2="454" class="grid"/>
  <line x1="320.5" y1="150" x2="320.5" y2="454" class="grid"/>
  <line x1="430.5" y1="150" x2="430.5" y2="454" class="grid"/>
  <line x1="540.5" y1="150" x2="540.5" y2="454" class="grid"/>
  <text x="210" y="474" text-anchor="middle" class="tick muted">360</text>
  <text x="320" y="474" text-anchor="middle" class="tick muted">380</text>
  <text x="430" y="474" text-anchor="middle" class="tick muted">400</text>
  <text x="540" y="474" text-anchor="middle" class="tick muted">420</text>

  <text x="48" y="188" class="label">DeepSeek V4 Flash</text>
  <rect x="210" y="169" width="242" height="25" rx="4" class="focus"/>
  <text x="464" y="188" class="value" font-weight="760">404 / 425</text>

  <text x="48" y="258" class="label">GLM 5.2</text>
  <rect x="210" y="239" width="231" height="25" rx="4" class="bar"/>
  <text x="453" y="258" class="value">402 / 425</text>

  <text x="48" y="328" class="label">DeepSeek V4 Pro</text>
  <rect x="210" y="309" width="226" height="25" rx="4" class="bar"/>
  <text x="448" y="328" class="value">401 / 425</text>

  <text x="48" y="398" class="label">Kimi K3 Low</text>
  <rect x="210" y="379" width="132" height="25" rx="4" class="bar"/>
  <text x="354" y="398" class="value">384 / 425</text>

  <line x1="610.5" y1="150" x2="610.5" y2="454" class="grid"/>
  <line x1="752.5" y1="150" x2="752.5" y2="454" class="grid"/>
  <line x1="894.5" y1="150" x2="894.5" y2="454" class="grid"/>
  <text x="610" y="474" text-anchor="middle" class="tick muted">$0.002</text>
  <text x="752" y="474" text-anchor="middle" class="tick muted">$0.02</text>
  <text x="894" y="474" text-anchor="middle" class="tick muted">$0.20</text>

  <line x1="610" y1="182" x2="625" y2="182" stroke="#72c7b4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="625" cy="182" r="7" class="cost"/>
  <text x="640" y="187" class="value">$0.002551</text>

  <line x1="610" y1="252" x2="813" y2="252" stroke="#72c7b4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="813" cy="252" r="7" class="cost"/>
  <text x="828" y="257" class="value">$0.053724</text>

  <line x1="610" y1="322" x2="719" y2="322" stroke="#72c7b4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="719" cy="322" r="7" class="cost"/>
  <text x="734" y="327" class="value">$0.011827</text>

  <line x1="610" y1="392" x2="899" y2="392" stroke="#72c7b4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="899" cy="392" r="7" class="cost"/>
  <text x="914" y="397" class="value">$0.215*</text>

  <text x="48" y="520" class="note muted">Candidate generation cost only. Flash, GLM, and Pro costs are exact; *Kimi cost is estimated. Judge spend excluded.</text>
</svg>
