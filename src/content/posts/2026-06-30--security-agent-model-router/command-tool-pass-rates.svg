<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Model performance, cost, and speed</title>
  <desc id="desc">Eight model routes ranked by judge score on the same hard Juice Shop task, with model cost and runtime shown beside each route. Kimi K3 and Claude Opus 4.8 score ten of ten. DeepSeek V4 Flash scores 9.33. GPT-5.6 Luna is the lowest-cost route.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="bar" x1="0" x2="1"><stop stop-color="#089c9a"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <linearGradient id="winner" x1="0" x2="1"><stop stop-color="#6dbb28"/><stop offset="1" stop-color="#b8ff5f"/></linearGradient>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:13px;font-weight:850;letter-spacing:1px;fill:#9eb4be}.label{font-size:18px;font-weight:760}.value{font-size:15px;font-weight:820;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.track{fill:#111d24}.score{fill:url(#bar)}.winner{fill:url(#winner)}.pill{fill:#101920;stroke:#2a414c}.cost{fill:#101920;stroke:#00f5ee;stroke-opacity:.55}.runtime{fill:#101920;stroke:#ad4dff;stroke-opacity:.6}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Model performance, cost, and speed</text><text class="sub" x="72" y="116">Same hard target · judge score / 10 · model cost · end-to-end runtime</text>
  <g transform="translate(330 176)">
    <g class="head"><text x="0" y="0">JUDGE SCORE</text><text x="620" y="0">MODEL COST</text><text x="830" y="0">RUNTIME</text></g>
    <g transform="translate(0 32)">
      <g transform="translate(0 0)"><text class="label" x="-28" y="31" text-anchor="end">Kimi K3</text><rect class="track" width="500" height="48" rx="9"/><rect class="winner" width="500" height="48" rx="9" filter="url(#glow)"/><text class="value" x="486" y="30" text-anchor="end">10.0 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.220184</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">223.4s</text></g></g>
      <g transform="translate(0 64)"><text class="label" x="-28" y="31" text-anchor="end">Claude Opus 4.8</text><rect class="track" width="500" height="48" rx="9"/><rect class="winner" width="500" height="48" rx="9"/><text class="value" x="486" y="30" text-anchor="end">10.0 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$1.633301</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">115.9s</text></g></g>
      <g transform="translate(0 128)"><text class="label" x="-28" y="31" text-anchor="end">DeepSeek V4 Flash</text><rect class="track" width="500" height="48" rx="9"/><rect class="score" width="467" height="48" rx="9"/><text class="value" x="486" y="30" text-anchor="end">9.33 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.058695</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">395.5s</text></g></g>
      <g transform="translate(0 192)"><text class="label" x="-28" y="31" text-anchor="end">GPT-5.6 Luna</text><rect class="track" width="500" height="48" rx="9"/><rect class="score" width="434" height="48" rx="9"/><text class="value" x="486" y="30" text-anchor="end">8.67 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.016304</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">52.2s</text></g></g>
      <g transform="translate(0 256)"><text class="label" x="-28" y="31" text-anchor="end">GPT-5.6 Terra</text><rect class="track" width="500" height="48" rx="9"/><rect class="score" width="400" height="48" rx="9"/><text class="value" x="486" y="30" text-anchor="end">8.0 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.124046</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">107.5s</text></g></g>
      <g transform="translate(0 320)"><text class="label" x="-28" y="31" text-anchor="end">GPT-5.6 Sol</text><rect class="track" width="500" height="48" rx="9"/><rect class="score" width="400" height="48" rx="9"/><text class="value" x="486" y="30" text-anchor="end">8.0 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.368514</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">229.6s</text></g></g>
      <g transform="translate(0 384)"><text class="label" x="-28" y="31" text-anchor="end">Qwen 3.6 Flash</text><rect class="track" width="500" height="48" rx="9"/><rect width="275" height="48" rx="9" fill="#ff6b9d"/><text class="value" x="486" y="30" text-anchor="end">5.5 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.085678</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">96.9s</text></g></g>
      <g transform="translate(0 448)"><text class="label" x="-28" y="31" text-anchor="end">GPT OSS 120B</text><rect class="track" width="500" height="48" rx="9"/><rect width="250" height="48" rx="9" fill="#ff6b9d"/><text class="value" x="486" y="30" text-anchor="end">5.0 / 10</text><g transform="translate(620 1)"><rect class="cost" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">$0.062529</text></g><g transform="translate(830 1)"><rect class="runtime" width="190" height="46" rx="10"/><text class="value" x="95" y="29" text-anchor="middle">36.6s</text></g></g>
    </g>
  </g>
  <g transform="translate(72 790)"><rect width="1296" height="62" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="27" font-size="15" font-weight="820" fill="#dfffc0">Kimi and Opus lead quality. Luna leads efficiency.</text><text class="note" x="22" y="49">DeepSeek reaches 9.33/10; GPT OSS trades quality for the shortest runtime.</text></g>
  <text class="note" x="72" y="884">ExploitHunter hard Juice Shop · judge score · model cost · runtime</text>
</svg>
