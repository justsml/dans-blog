<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Latest full-suite average model leaderboard</title>
  <desc id="desc">Seven model routes compared by average deterministic score, scenarios passed, and model cost across repeated runs of the same fourteen security tool-behavior scenarios. GPT-5.6 Sol leads at 414.3 of 425. DeepSeek V4 Flash averages 410.3 for 0.004735 dollars.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="bar" x1="0" x2="1"><stop stop-color="#078b88"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <linearGradient id="best" x1="0" x2="1"><stop stop-color="#6dbd27"/><stop offset="1" stop-color="#b8ff5f"/></linearGradient>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:13px;font-weight:800;letter-spacing:1.2px;fill:#9eb4be}.label{font-size:18px;font-weight:750}.value{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}.meta{font-size:12px;fill:#91a7b2}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8;shape-rendering:crispEdges}.track{fill:#111b22}.score{fill:url(#bar)}.winner{fill:url(#best)}.pill{fill:#101a20;stroke:#2b3e49}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
