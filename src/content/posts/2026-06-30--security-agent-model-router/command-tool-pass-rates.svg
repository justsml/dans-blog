<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" role="img" aria-labelledby="title desc">
  <title id="title">Latest local model tool-discipline results</title>
  <desc id="desc">Horizontal bar chart of model tool behavior scores. Devstral Small 24B leads the comparable ten-scenario local baseline, while Kimi K3 is shown separately because it ran a broader fourteen-scenario suite.</desc>
  <defs><style>
    .bg{fill:#f8fafc}.title{font:800 34px ui-sans-serif,system-ui,sans-serif;fill:#0f172a}.sub{font:500 17px ui-sans-serif,system-ui,sans-serif;fill:#475569}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 8}.tick{font:700 14px ui-sans-serif,system-ui,sans-serif;fill:#475569}.label{font:800 18px ui-sans-serif,system-ui,sans-serif;fill:#0f172a}.value{font:800 18px ui-sans-serif,system-ui,sans-serif;fill:#0f172a}.small{font:600 14px ui-sans-serif,system-ui,sans-serif;fill:#64748b}.bar{fill:#0ea5e9}.bar2{fill:#22c55e}.bar3{fill:#f59e0b}.bar4{fill:#f97316}.bar5{fill:#94a3b8}.note{fill:#e0f2fe;stroke:#7dd3fc;stroke-width:1.5}
  </style></defs>
  <rect class="bg" width="1280" height="700"/><text class="title" x="64" y="58">Tool discipline is measurable, too</text><text class="sub" x="64" y="88">Latest local baselines. Score incorporates the harness’s behavioral and judge checks—not just whether a tool call parsed.</text>
  <g transform="translate(300 144)"><line class="grid" x1="0" y1="0" x2="0" y2="370"/><line class="grid" x1="210" y1="0" x2="210" y2="370"/><line class="grid" x1="420" y1="0" x2="420" y2="370"/><line class="grid" x1="630" y1="0" x2="630" y2="370"/><line class="grid" x1="840" y1="0" x2="840" y2="370"/><line class="axis" x1="0" y1="370" x2="840" y2="370"/>
    <text class="tick" x="0" y="400" text-anchor="middle">0%</text><text class="tick" x="210" y="400" text-anchor="middle">25%</text><text class="tick" x="420" y="400" text-anchor="middle">50%</text><text class="tick" x="630" y="400" text-anchor="middle">75%</text><text class="tick" x="840" y="400" text-anchor="middle">100%</text><text class="label" x="420" y="430" text-anchor="middle">Tool-behavior score</text>
    <text class="label" x="-28" y="49" text-anchor="end">Devstral Small 24B</text><rect class="bar2" x="0" y="19" width="804" height="48" rx="8"/><text class="value" x="820" y="51">95.7% · 269/281 · 8/10</text>
    <text class="label" x="-28" y="117" text-anchor="end">Gemma 4 E4B</text><rect class="bar" x="0" y="87" width="780" height="48" rx="8"/><text class="value" x="796" y="119">92.9% · 261/281 · 7/10</text>
    <text class="label" x="-28" y="185" text-anchor="end">GPT OSS 20B</text><rect class="bar" x="0" y="155" width="768" height="48" rx="8"/><text class="value" x="784" y="187">91.5% · 257/281 · 6/10</text>
    <text class="label" x="-28" y="253" text-anchor="end">Gemma 4 E2B</text><rect class="bar3" x="0" y="223" width="705" height="48" rx="8"/><text class="value" x="721" y="255">84.0% · 236/281 · 4/10</text>
    <text class="label" x="-28" y="321" text-anchor="end">LFM 2.5 1.2B</text><rect class="bar5" x="0" y="291" width="667" height="48" rx="8"/><text class="value" x="683" y="323">79.4% · 223/281 · 4/10</text>
  </g>
  <g transform="translate(64 618)"><rect class="note" width="1152" height="48" rx="10"/><text class="label" x="22" y="31">Separate broader Kimi K3 baseline:</text><text class="value" x="350" y="31">90.4% · 384/425 · 10/14 scenarios · 48/462 tool calls</text><text class="small" x="780" y="31">Not ranked against the ten-scenario local rows.</text></g>
  <text class="small" x="64" y="602">All listed local routes had zero dangerous-command attempts in these baseline rows. Score changes by scenario mix; use it as a routing signal, not a crown.</text>
</svg>
