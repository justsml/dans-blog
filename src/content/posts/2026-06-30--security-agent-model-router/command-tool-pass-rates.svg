  <g transform="translate(72 790)"><rect width="1296" height="62" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="27" font-size="15" font-weight="800" fill="#dfffc0">Sol leads average performance. Flash is the cost-performance outlier.</text><text class="note" x="22" y="49">Flash trails Sol by four points while costing about 98× less. Gemini trails Sol by three points and is the most consistent high scorer.</text></g>
