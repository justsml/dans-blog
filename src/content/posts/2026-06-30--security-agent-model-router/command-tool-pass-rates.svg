<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Command-tool eval pass rates by scenario</title>
  <desc id="desc">A bar chart showing that simple tool calls pass at nearly one hundred percent while command-oriented security tasks are much harder.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .axis { stroke: #334155; stroke-width: 2; }
      .grid { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 8; }
      .tick { font: 700 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .value { font: 850 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 650 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .bar-api { fill: #0ea5e9; }
      .bar-simple { fill: #22c55e; }
      .bar-mid { fill: #f59e0b; }
      .bar-hard { fill: #ef4444; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720" />
  <text class="title" x="64" y="58">"Computer use" gets harder when tools become commands</text>
  <text class="subtitle" x="64" y="88">Pass rates from fresh model-tool evals. Simple API-style tool calls are mostly solved; command planning is not.</text>

  <g transform="translate(112 138)">
    <line class="grid" x1="0" y1="430" x2="1010" y2="430" />
    <line class="grid" x1="0" y1="322.5" x2="1010" y2="322.5" />
    <line class="grid" x1="0" y1="215" x2="1010" y2="215" />
    <line class="grid" x1="0" y1="107.5" x2="1010" y2="107.5" />
    <line class="grid" x1="0" y1="0" x2="1010" y2="0" />
    <line class="axis" x1="0" y1="430" x2="1010" y2="430" />
    <line class="axis" x1="0" y1="0" x2="0" y2="430" />

    <text class="tick" x="-20" y="434" text-anchor="end">0%</text>
    <text class="tick" x="-20" y="327" text-anchor="end">25%</text>
    <text class="tick" x="-20" y="220" text-anchor="end">50%</text>
    <text class="tick" x="-20" y="112" text-anchor="end">75%</text>
    <text class="tick" x="-20" y="5" text-anchor="end">100%</text>

    <g transform="translate(52 0)">
      <rect class="bar-api" x="0" y="0" width="104" height="430" rx="12" />
      <text class="value" x="52" y="-14" text-anchor="middle">100%</text>
      <text class="label" x="52" y="468" text-anchor="middle">API tools</text>
      <text class="small" x="52" y="492" text-anchor="middle">120/120</text>
    </g>

    <g transform="translate(226 0)">
      <rect class="bar-simple" x="0" y="46" width="104" height="384" rx="12" />
      <text class="value" x="52" y="32" text-anchor="middle">89%</text>
      <text class="label" x="52" y="468" text-anchor="middle">Repeat tool</text>
      <text class="small" x="52" y="492" text-anchor="middle">25/28</text>
    </g>

    <g transform="translate(400 0)">
      <rect class="bar-simple" x="0" y="15" width="104" height="415" rx="12" />
      <text class="value" x="52" y="1" text-anchor="middle">96%</text>
      <text class="label" x="52" y="468" text-anchor="middle">Sequenced</text>
      <text class="small" x="52" y="492" text-anchor="middle">27/28</text>
    </g>

    <g transform="translate(574 0)">
      <rect class="bar-mid" x="0" y="184" width="104" height="246" rx="12" />
      <text class="value" x="52" y="170" text-anchor="middle">57%</text>
      <text class="label" x="52" y="468" text-anchor="middle">Wi-Fi crack</text>
      <text class="small" x="52" y="492" text-anchor="middle">16/28</text>
    </g>

    <g transform="translate(748 0)">
      <rect class="bar-hard" x="0" y="261" width="104" height="169" rx="12" />
      <text class="value" x="52" y="247" text-anchor="middle">39%</text>
      <text class="label" x="52" y="468" text-anchor="middle">LAN scan</text>
      <text class="small" x="52" y="492" text-anchor="middle">11/28</text>
    </g>

    <g transform="translate(900 78)">
      <rect class="card" x="0" y="0" width="258" height="224" rx="14" />
      <text class="label" x="22" y="38">Why the hard rows fail</text>
      <text class="small" x="22" y="72">- command choice is almost right</text>
      <text class="small" x="22" y="100">- final text omits recovered output</text>
      <text class="small" x="22" y="128">- shell forms trip safety parsing</text>
      <text class="small" x="22" y="156">- models keep probing instead of</text>
      <text class="small" x="34" y="178">synthesizing</text>
      <text class="small" x="22" y="206">- step budgets catch near-misses</text>
    </g>
  </g>

  <text class="small" x="64" y="675">Sources: model-tool-behavior/live-all-models-2026-06-28-costed and model-tool-command-wide-20260630 shards. Command-wide total: 79/112 passed, 2516/2632 score, 474 tool calls, $0.164351.</text>
</svg>
