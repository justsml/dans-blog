<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Fourteen-scenario model performance, pass rate, and candidate cost</title>
  <desc id="desc">A model scoreboard comparing DeepSeek V4 Flash, GLM 5.2, DeepSeek V4 Pro, local Gemma 4 E4B, and Kimi K3 Low on the same fourteen security tool-behavior scenarios. Flash scores 404 of 425. Pro passes 11 of 14 scenarios. Local Gemma scores 392 with zero candidate API cost.</desc>
  <defs>
    <linearGradient id="topRule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="cyanBar" x1="0" x2="1"><stop stop-color="#007f7d"/><stop offset="1" stop-color="#00f5ee"/></linearGradient>
    <linearGradient id="limeBar" x1="0" x2="1"><stop stop-color="#5d9d25"/><stop offset="1" stop-color="#b8ff5f"/></linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:34px;font-weight:800}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:13px;font-weight:800;letter-spacing:1.2px;fill:#9eb4be}.label{font-size:18px;font-weight:750}.value{font-size:15px;font-weight:780;font-variant-numeric:tabular-nums}.meta{font-size:13px;fill:#9db1bb;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.grid{stroke:#26353e;stroke-width:.75;stroke-dasharray:3 8;shape-rendering:crispEdges}.track{fill:#111b22}.score{fill:url(#cyanBar)}.local{fill:url(#limeBar)}.passTrack{fill:#111b22;stroke:#2b3e49}.pass{fill:#ff6b9d}.passBest{fill:#b8ff5f}.cost{fill:#101a20;stroke:#2b3e49}.costLocal{fill:#b8ff5f;fill-opacity:.1;stroke:#b8ff5f;stroke-opacity:.5}
    </style>
  </defs>
  <rect width="1440" height="820" rx="24" fill="#05080b"/>
  <rect x="32" y="28" width="1376" height="764" rx="20" fill="#0a1015" stroke="#20303a"/>
  <rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#topRule)"/>
  <text class="title" x="72" y="82">14-scenario model scoreboard</text>
  <text class="sub" x="72" y="112">Same tasks · same 425-point scorer · performance, pass rate, and candidate cost shown together</text>

  <text class="head" x="72" y="178">MODEL ROUTE</text>
  <text class="head" x="342" y="178">DETERMINISTIC PERFORMANCE</text>
  <text class="head" x="996" y="178" text-anchor="middle">SCENARIOS PASSED</text>
  <text class="head" x="1260" y="178" text-anchor="middle">CANDIDATE COST</text>

  <g transform="translate(342 212)">
    <g class="grid"><line x1="0" y1="0" x2="0" y2="410"/><line x1="142" y1="0" x2="142" y2="410"/><line x1="284" y1="0" x2="284" y2="410"/><line x1="426" y1="0" x2="426" y2="410"/><line x1="568" y1="0" x2="568" y2="410"/></g>
    <g class="meta" text-anchor="middle"><text x="0" y="442">360</text><text x="142" y="442">375</text><text x="284" y="442">390</text><text x="426" y="442">405</text><text x="568" y="442">420 points</text></g>

    <g transform="translate(0 8)"><text class="label" x="-34" y="31" text-anchor="end">DeepSeek V4 Flash</text><rect class="track" width="568" height="46" rx="8"/><rect class="score" width="417" height="46" rx="8" filter="url(#glow)"/><text class="value" x="433" y="30">404 / 425 · 95.06%</text><g transform="translate(626 2)"><rect class="passTrack" width="116" height="42" rx="21"/><circle class="pass" cx="25" cy="21" r="7"/><text class="value" x="72" y="27" text-anchor="middle">10 / 14</text></g><g transform="translate(794 2)"><rect class="cost" width="224" height="42" rx="10"/><text class="value" x="112" y="27" text-anchor="middle">$0.002551 exact</text></g></g>
    <g transform="translate(0 88)"><text class="label" x="-34" y="31" text-anchor="end">GLM 5.2</text><rect class="track" width="568" height="46" rx="8"/><rect class="score" width="398" height="46" rx="8"/><text class="value" x="414" y="30">402 / 425 · 94.59%</text><g transform="translate(626 2)"><rect class="passTrack" width="116" height="42" rx="21"/><circle class="pass" cx="25" cy="21" r="7"/><text class="value" x="72" y="27" text-anchor="middle">10 / 14</text></g><g transform="translate(794 2)"><rect class="cost" width="224" height="42" rx="10"/><text class="value" x="112" y="27" text-anchor="middle">$0.053724 exact</text></g></g>
    <g transform="translate(0 168)"><text class="label" x="-34" y="31" text-anchor="end">DeepSeek V4 Pro</text><rect class="track" width="568" height="46" rx="8"/><rect class="score" width="388" height="46" rx="8"/><text class="value" x="404" y="30">401 / 425 · 94.35%</text><g transform="translate(626 2)"><rect class="passTrack" width="116" height="42" rx="21"/><circle class="passBest" cx="25" cy="21" r="7" filter="url(#glow)"/><text class="value" x="72" y="27" text-anchor="middle">11 / 14</text></g><g transform="translate(794 2)"><rect class="cost" width="224" height="42" rx="10"/><text class="value" x="112" y="27" text-anchor="middle">$0.011827 exact</text></g></g>
    <g transform="translate(0 248)"><text class="label" x="-34" y="31" text-anchor="end">Local Gemma 4 E4B</text><rect class="track" width="568" height="46" rx="8"/><rect class="local" width="303" height="46" rx="8"/><text class="value" x="319" y="30" fill="#dfffc0">392 / 425 · 92.24%</text><g transform="translate(626 2)"><rect class="passTrack" width="116" height="42" rx="21"/><circle class="pass" cx="25" cy="21" r="7"/><text class="value" x="72" y="27" text-anchor="middle">10 / 14</text></g><g transform="translate(794 2)"><rect class="costLocal" width="224" height="42" rx="10"/><text class="value" x="112" y="27" text-anchor="middle" fill="#dfffc0">$0 candidate API</text></g></g>
    <g transform="translate(0 328)"><text class="label" x="-34" y="31" text-anchor="end">Kimi K3 Low</text><rect class="track" width="568" height="46" rx="8"/><rect class="score" width="227" height="46" rx="8"/><text class="value" x="243" y="30">384 / 425 · 90.35%</text><g transform="translate(626 2)"><rect class="passTrack" width="116" height="42" rx="21"/><circle class="pass" cx="25" cy="21" r="7"/><text class="value" x="72" y="27" text-anchor="middle">10 / 14</text></g><g transform="translate(794 2)"><rect class="cost" width="224" height="42" rx="10"/><text class="value" x="112" y="27" text-anchor="middle">$0.215106 estimated</text></g></g>
  </g>

  <g transform="translate(72 694)"><rect width="1296" height="58" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="25" font-size="15" font-weight="780" fill="#cce1e8">One shared scoreboard, three different winners:</text><text class="note" x="22" y="46">Flash leads score · Pro leads pass count · local Gemma leads candidate cost. Judge spend is excluded from candidate cost.</text></g>
  <text class="note" x="72" y="778">ExploitHunter full tool-behavior suite · hosted results July 16 plus local Gemma completion July 17, 2026</text>
</svg>
