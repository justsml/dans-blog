<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">Docker network-lab score matrix across five model routes</title>
  <desc id="desc">A dark neon heatmap comparing normalized scores for IDOR report access, SSRF URL preview, and archive extraction preview. GPT-5.5 Low has the highest composite score. GPT OSS 120B is the lowest-cost route.</desc>
  <defs>
    <linearGradient id="topRule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:34px;font-weight:800}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:15px;font-weight:750;fill:#dce9ee}.row{font-size:18px;font-weight:720}.value{font-size:22px;font-weight:820;font-variant-numeric:tabular-nums}.minor{font-size:13px;fill:#91a7b2}.note{font-size:13px;fill:#91a7b2}.cell{stroke-width:1.25}.perfect{fill:#b8ff5f;fill-opacity:.16;stroke:#b8ff5f}.high{fill:#00f5ee;fill-opacity:.14;stroke:#00f5ee}.mid{fill:#ad4dff;fill-opacity:.15;stroke:#ad4dff}.low{fill:#ff6b9d;fill-opacity:.13;stroke:#ff6b9d}.zero{fill:#18232b;stroke:#3a4a54}.lime{fill:#d9ffad}.cyan{fill:#9cfff9}.purple{fill:#d9b3ff}.pink{fill:#ffb1ca}.dim{fill:#71858f}.chip{fill:#0f171d;stroke:#263640;stroke-width:1}.grid{stroke:#25333c;stroke-width:.75;shape-rendering:crispEdges}
    </style>
  </defs>
  <rect width="1440" height="860" rx="24" fill="#05080b"/>
  <rect x="32" y="28" width="1376" height="804" rx="20" fill="#0a1015" stroke="#20303a"/>
  <rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#topRule)"/>
  <text class="title" x="72" y="82">Docker network-lab matrix</text>
  <text class="sub" x="72" y="112">Three comparable scenarios · normalized score inside each cell · higher is better</text>

  <g transform="translate(390 174)">
    <line class="grid" x1="0" y1="58.5" x2="966" y2="58.5"/>
    <g class="head" text-anchor="middle">
      <text x="86" y="0"><tspan x="86">GPT-5.5</tspan><tspan x="86" dy="21">Low</tspan></text>
      <text x="282" y="0"><tspan x="282">Claude Opus</tspan><tspan x="282" dy="21">4.8 Low</tspan></text>
      <text x="478" y="0"><tspan x="478">GPT-5.5</tspan><tspan x="478" dy="21">XHigh</tspan></text>
      <text x="674" y="0"><tspan x="674">Claude Sonnet</tspan><tspan x="674" dy="21">5 Low</tspan></text>
      <text x="870" y="0"><tspan x="870">GPT OSS</tspan><tspan x="870" dy="21">120B</tspan></text>
    </g>

    <g transform="translate(0 92)">
      <text class="row" x="-34" y="38" text-anchor="end"><tspan x="-34">IDOR / report</tspan><tspan x="-34" dy="23">access</tspan></text>
      <rect class="cell perfect" x="0" width="172" height="94" rx="12" filter="url(#glow)"/><text class="value lime" x="86" y="56" text-anchor="middle">1.00</text>
      <rect class="cell high" x="196" width="172" height="94" rx="12"/><text class="value cyan" x="282" y="56" text-anchor="middle">0.86</text>
      <rect class="cell perfect" x="392" width="172" height="94" rx="12"/><text class="value lime" x="478" y="56" text-anchor="middle">1.00</text>
      <rect class="cell perfect" x="588" width="172" height="94" rx="12"/><text class="value lime" x="674" y="56" text-anchor="middle">1.00</text>
      <rect class="cell high" x="784" width="172" height="94" rx="12"/><text class="value cyan" x="870" y="56" text-anchor="middle">0.90</text>
    </g>
    <g transform="translate(0 218)">
      <text class="row" x="-34" y="49" text-anchor="end">SSRF URL preview</text>
      <rect class="cell perfect" x="0" width="172" height="94" rx="12"/><text class="value lime" x="86" y="56" text-anchor="middle">1.00</text>
      <rect class="cell high" x="196" width="172" height="94" rx="12"/><text class="value cyan" x="282" y="56" text-anchor="middle">0.86</text>
      <rect class="cell perfect" x="392" width="172" height="94" rx="12"/><text class="value lime" x="478" y="56" text-anchor="middle">1.00</text>
      <rect class="cell low" x="588" width="172" height="94" rx="12"/><text class="value pink" x="674" y="56" text-anchor="middle">0.19</text>
      <rect class="cell mid" x="784" width="172" height="94" rx="12"/><text class="value purple" x="870" y="56" text-anchor="middle">0.76</text>
    </g>
    <g transform="translate(0 344)">
      <text class="row" x="-34" y="38" text-anchor="end"><tspan x="-34">Archive</tspan><tspan x="-34" dy="23">extraction</tspan></text>
      <rect class="cell mid" x="0" width="172" height="94" rx="12"/><text class="value purple" x="86" y="56" text-anchor="middle">0.76</text>
      <rect class="cell mid" x="196" width="172" height="94" rx="12"/><text class="value purple" x="282" y="56" text-anchor="middle">0.76</text>
      <rect class="cell zero" x="392" width="172" height="94" rx="12"/><text class="value dim" x="478" y="56" text-anchor="middle">0.00</text>
      <rect class="cell high" x="588" width="172" height="94" rx="12"/><text class="value cyan" x="674" y="56" text-anchor="middle">0.90</text>
      <rect class="cell mid" x="784" width="172" height="94" rx="12"/><text class="value purple" x="870" y="56" text-anchor="middle">0.52</text>
    </g>

    <g transform="translate(0 470)">
      <text class="minor" x="-34" y="25" text-anchor="end"><tspan x="-34">Composite</tspan><tspan x="-34" dy="18">score · cost</tspan></text>
      <g transform="translate(0)"><rect class="chip" width="172" height="68" rx="10"/><text class="value cyan" x="86" y="29" text-anchor="middle" font-size="18">58 / 63</text><text class="minor" x="86" y="52" text-anchor="middle">$10.979</text></g>
      <g transform="translate(196)"><rect class="chip" width="172" height="68" rx="10"/><text class="value" x="86" y="29" text-anchor="middle" font-size="18">52 / 63</text><text class="minor" x="86" y="52" text-anchor="middle">$8.938</text></g>
      <g transform="translate(392)"><rect class="chip" width="172" height="68" rx="10"/><text class="value" x="86" y="29" text-anchor="middle" font-size="18">42 / 63</text><text class="minor" x="86" y="52" text-anchor="middle">$7.999</text></g>
      <g transform="translate(588)"><rect class="chip" width="172" height="68" rx="10"/><text class="value" x="86" y="29" text-anchor="middle" font-size="18">44 / 63</text><text class="minor" x="86" y="52" text-anchor="middle">$5.055</text></g>
      <g transform="translate(784)"><rect class="chip" width="172" height="68" rx="10"/><text class="value lime" x="86" y="29" text-anchor="middle" font-size="18">46 / 63</text><text class="minor" x="86" y="52" text-anchor="middle" fill="#dfffc0">$0.049</text></g>
    </g>
  </g>

  <g transform="translate(72 752)">
    <rect class="perfect cell" width="28" height="18" rx="4"/><text class="note" x="40" y="14">1.00</text>
    <rect class="high cell" x="118" width="28" height="18" rx="4"/><text class="note" x="158" y="14">0.85–0.99</text>
    <rect class="mid cell" x="296" width="28" height="18" rx="4"/><text class="note" x="336" y="14">0.40–0.84</text>
    <rect class="low cell" x="474" width="28" height="18" rx="4"/><text class="note" x="514" y="14">0.01–0.39</text>
    <rect class="zero cell" x="652" width="28" height="18" rx="4"/><text class="note" x="692" y="14">0.00</text>
  </g>
  <text class="note" x="72" y="810">ExploitHunter Docker-network composite · July 2026 · cells include scenario-specific evidence and behavior checks</text>
</svg>
