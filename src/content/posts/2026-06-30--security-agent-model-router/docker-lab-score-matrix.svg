      <g transform="translate(0 222)"><text class="row" x="-30" y="36" text-anchor="end">GPT-5.6 Terra</text><rect class="strong" width="188" height="56" rx="10"/><text class="value cyan" x="94" y="35" text-anchor="middle">405.7 / 425</text><rect class="strong" x="204" width="188" height="56" rx="10"/><text class="value cyan" x="298" y="35" text-anchor="middle">398–412</text><rect class="top" x="408" width="188" height="56" rx="10"/><text class="value lime" x="502" y="35" text-anchor="middle">12.00 / 14</text><rect class="strong" x="612" width="188" height="56" rx="10"/><text class="value cyan" x="706" y="35" text-anchor="middle">299.3 / 308</text><rect class="mid" x="816" width="188" height="56" rx="10"/><text class="value" x="910" y="35" text-anchor="middle">$0.180501</text></g>
      <g transform="translate(0 296)"><text class="row" x="-30" y="36" text-anchor="end">DeepSeek V4 Pro</text><rect class="mid" width="188" height="56" rx="10"/><text class="value" x="94" y="35" text-anchor="middle">400.0 / 425</text><rect class="mid" x="204" width="188" height="56" rx="10"/><text class="value" x="298" y="35" text-anchor="middle">392–408</text><rect class="mid" x="408" width="188" height="56" rx="10"/><text class="value" x="502" y="35" text-anchor="middle">10.33 / 14</text><rect class="mid" x="612" width="188" height="56" rx="10"/><text class="value" x="706" y="35" text-anchor="middle">295.3 / 308</text><rect class="strong" x="816" width="188" height="56" rx="10"/><text class="value cyan" x="910" y="35" text-anchor="middle">$0.130401</text></g>
      <g transform="translate(0 370)"><text class="row" x="-30" y="36" text-anchor="end">Kimi K3 Native</text><rect class="mid" width="188" height="56" rx="10"/><text class="value" x="94" y="35" text-anchor="middle">399.0 / 425</text><rect class="top" x="204" width="188" height="56" rx="10"/><text class="value lime" x="298" y="35" text-anchor="middle">396–402</text><rect class="mid" x="408" width="188" height="56" rx="10"/><text class="value" x="502" y="35" text-anchor="middle">10.33 / 14</text><rect class="strong" x="612" width="188" height="56" rx="10"/><text class="value cyan" x="706" y="35" text-anchor="middle">300.0 / 308</text><rect class="cost" x="816" width="188" height="56" rx="10"/><text class="value pink" x="910" y="35" text-anchor="middle">$2.303873</text></g>
      <g transform="translate(0 444)"><text class="row" x="-30" y="36" text-anchor="end">GLM 5.2</text><rect class="mid" width="188" height="56" rx="10"/><text class="value" x="94" y="35" text-anchor="middle">397.3 / 425</text><rect class="cost" x="204" width="188" height="56" rx="10"/><text class="value pink" x="298" y="35" text-anchor="middle">384–409</text><rect class="mid" x="408" width="188" height="56" rx="10"/><text class="value" x="502" y="35" text-anchor="middle">10.33 / 14</text><rect class="mid" x="612" width="188" height="56" rx="10"/><text class="value" x="706" y="35" text-anchor="middle">297.3 / 308</text><rect class="mid" x="816" width="188" height="56" rx="10"/><text class="value" x="910" y="35" text-anchor="middle">$0.287614</text></g>
    </g>
  </g>
  <g transform="translate(72 790)"><rect width="1296" height="58" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="25" font-size="15" font-weight="800" fill="#9cfff9">Sol wins average score. Gemini owns high-end consistency. Flash owns price.</text><text class="note" x="22" y="46">Kimi is exceptionally steady, but its $2.303873 average cost changes the routing decision.</text></g>
  <text class="note" x="72" y="880">ExploitHunter model-tool behavior suite · three fixed-configuration full runs per route · verified July 17, 2026</text>
</svg>
