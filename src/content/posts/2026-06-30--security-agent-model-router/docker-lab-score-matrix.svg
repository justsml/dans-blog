      .note { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .na { fill: #e5e7eb; }
      .zero { fill: #f1f5f9; }
      .low { fill: #fef3c7; }
      .mid { fill: #fde68a; }
      .good { fill: #86efac; }
      .great { fill: #16a34a; }
