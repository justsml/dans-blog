<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Latest full-suite model comparison matrix</title>
  <desc id="desc">Seven model routes compared by average score, observed score range, average scenarios passed, average judge score, and average model cost on the same fourteen security tool-behavior scenarios.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-35%" y="-60%" width="170%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:13px;font-weight:800;letter-spacing:1px;fill:#9eb4be}.row{font-size:18px;font-weight:750}.value{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.cell{fill:#101920;stroke:#263944;shape-rendering:crispEdges}.top{fill:#b8ff5f;fill-opacity:.13;stroke:#b8ff5f}.strong{fill:#00f5ee;fill-opacity:.11;stroke:#00f5ee}.mid{fill:#ad4dff;fill-opacity:.12;stroke:#ad4dff}.cost{fill:#ff6b9d;fill-opacity:.1;stroke:#ff6b9d}.lime{fill:#dfffc0}.cyan{fill:#9cfff9}.pink{fill:#ffb1ca}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Current full-suite comparison</text><text class="sub" x="72" y="116">Seven routes · same 14 scenarios · averages plus the observed score range</text>
  <g transform="translate(368 180)">
    <g class="head" text-anchor="middle"><text x="106" y="0"><tspan x="106">AVERAGE</tspan><tspan x="106" dy="19">SCORE</tspan></text><text x="310" y="0"><tspan x="310">SCORE</tspan><tspan x="310" dy="19">RANGE</tspan></text><text x="514" y="0"><tspan x="514">AVERAGE</tspan><tspan x="514" dy="19">PASSED</tspan></text><text x="718" y="0"><tspan x="718">AVERAGE</tspan><tspan x="718" dy="19">JUDGE</tspan></text><text x="922" y="0"><tspan x="922">AVERAGE</tspan><tspan x="922" dy="19">COST</tspan></text></g>
    <g transform="translate(0 58)">
      <g transform="translate(0 0)"><text class="row" x="-30" y="36" text-anchor="end">GPT-5.6 Sol</text><rect class="top" width="188" height="56" rx="10" filter="url(#glow)"/><text class="value lime" x="94" y="35" text-anchor="middle">414.3 / 425</text><rect class="mid" x="204" width="188" height="56" rx="10"/><text class="value" x="298" y="35" text-anchor="middle">399–422</text><rect class="top" x="408" width="188" height="56" rx="10"/><text class="value lime" x="502" y="35" text-anchor="middle">12.67 / 14</text><rect class="top" x="612" width="188" height="56" rx="10"/><text class="value lime" x="706" y="35" text-anchor="middle">302.0 / 308</text><rect class="mid" x="816" width="188" height="56" rx="10"/><text class="value" x="910" y="35" text-anchor="middle">$0.465044</text></g>
      <g transform="translate(0 74)"><text class="row" x="-30" y="36" text-anchor="end">Gemini 3.5 Flash</text><rect class="strong" width="188" height="56" rx="10"/><text class="value cyan" x="94" y="35" text-anchor="middle">411.3 / 425</text><rect class="top" x="204" width="188" height="56" rx="10"/><text class="value lime" x="298" y="35" text-anchor="middle">409–414</text><rect class="strong" x="408" width="188" height="56" rx="10"/><text class="value cyan" x="502" y="35" text-anchor="middle">11.67 / 14</text><rect class="top" x="612" width="188" height="56" rx="10"/><text class="value lime" x="706" y="35" text-anchor="middle">303.3 / 308</text><rect class="cost" x="816" width="188" height="56" rx="10"/><text class="value pink" x="910" y="35" text-anchor="middle">$0.538653</text></g>
