<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Hard-target model comparison</title>
  <desc id="desc">Eight model routes compared on the same hard Juice Shop task by judge score, model cost, runtime, and tool calls. Kimi K3 and Claude Opus 4.8 score ten of ten. DeepSeek V4 Flash scores 9.33. GPT-5.6 Luna has the strongest efficiency result.</desc>
  <defs>
    <linearGradient id="rule" x1="0" x2="1"><stop stop-color="#00f5ee"/><stop offset=".5" stop-color="#b8ff5f"/><stop offset="1" stop-color="#ff6b9d"/></linearGradient>
    <filter id="glow" x="-35%" y="-60%" width="170%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>text{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff}.title{font-size:36px;font-weight:820}.sub{font-size:17px;fill:#a7bbc6}.head{font-size:13px;font-weight:800;letter-spacing:1px;fill:#9eb4be}.row{font-size:17px;font-weight:760}.value{font-size:16px;font-weight:820;font-variant-numeric:tabular-nums}.note{font-size:13px;fill:#91a7b2}.top{fill:#b8ff5f;fill-opacity:.13;stroke:#b8ff5f}.strong{fill:#00f5ee;fill-opacity:.11;stroke:#00f5ee}.mid{fill:#ad4dff;fill-opacity:.12;stroke:#ad4dff}.warn{fill:#ff6b9d;fill-opacity:.1;stroke:#ff6b9d}.neutral{fill:#101920;stroke:#263944}.lime{fill:#dfffc0}.cyan{fill:#9cfff9}.pink{fill:#ffb1ca}</style>
  </defs>
  <rect width="1440" height="920" rx="24" fill="#05080b"/><rect x="32" y="28" width="1376" height="864" rx="20" fill="#0a1015" stroke="#20303a"/><rect x="32" y="28" width="1376" height="4" rx="2" fill="url(#rule)"/>
  <text class="title" x="72" y="84">Hard-target model comparison</text><text class="sub" x="72" y="116">Same ExploitHunter browser task · judge score · model cost · runtime · tool calls</text>
  <g transform="translate(326 176)">
    <g class="head" text-anchor="middle"><text x="100" y="0"><tspan x="100">JUDGE</tspan><tspan x="100" dy="18">SCORE</tspan></text><text x="316" y="0"><tspan x="316">MODEL</tspan><tspan x="316" dy="18">COST</tspan></text><text x="532" y="0"><tspan x="532">RUNTIME</tspan><tspan x="532" dy="18">SECONDS</tspan></text><text x="748" y="0"><tspan x="748">TOOL</tspan><tspan x="748" dy="18">CALLS</tspan></text></g>
    <g transform="translate(0 52)">
      <g transform="translate(0 0)"><text class="row" x="-28" y="34" text-anchor="end">Kimi K3</text><rect class="top" width="200" height="52" rx="10" filter="url(#glow)"/><text class="value lime" x="100" y="33" text-anchor="middle">10.0 / 10</text><rect class="top" x="216" width="200" height="52" rx="10"/><text class="value lime" x="316" y="33" text-anchor="middle">$0.220184</text><rect class="mid" x="432" width="200" height="52" rx="10"/><text class="value" x="532" y="33" text-anchor="middle">223.4s</text><rect class="neutral" x="648" width="200" height="52" rx="10"/><text class="value" x="748" y="33" text-anchor="middle">8.0</text></g>
      <g transform="translate(0 64)"><text class="row" x="-28" y="34" text-anchor="end">Claude Opus 4.8</text><rect class="top" width="200" height="52" rx="10"/><text class="value lime" x="100" y="33" text-anchor="middle">10.0 / 10</text><rect class="warn" x="216" width="200" height="52" rx="10"/><text class="value pink" x="316" y="33" text-anchor="middle">$1.633301</text><rect class="strong" x="432" width="200" height="52" rx="10"/><text class="value cyan" x="532" y="33" text-anchor="middle">115.9s</text><rect class="neutral" x="648" width="200" height="52" rx="10"/><text class="value" x="748" y="33" text-anchor="middle">8.0</text></g>
      <g transform="translate(0 128)"><text class="row" x="-28" y="34" text-anchor="end">DeepSeek V4 Flash</text><rect class="strong" width="200" height="52" rx="10"/><text class="value cyan" x="100" y="33" text-anchor="middle">9.33 / 10</text><rect class="strong" x="216" width="200" height="52" rx="10"/><text class="value cyan" x="316" y="33" text-anchor="middle">$0.058695</text><rect class="mid" x="432" width="200" height="52" rx="10"/><text class="value" x="532" y="33" text-anchor="middle">395.5s</text><rect class="mid" x="648" width="200" height="52" rx="10"/><text class="value" x="748" y="33" text-anchor="middle">32.0</text></g>
      <g transform="translate(0 192)"><text class="row" x="-28" y="34" text-anchor="end">GPT-5.6 Luna</text><rect class="mid" width="200" height="52" rx="10"/><text class="value" x="100" y="33" text-anchor="middle">8.67 / 10</text><rect class="top" x="216" width="200" height="52" rx="10" filter="url(#glow)"/><text class="value lime" x="316" y="33" text-anchor="middle">$0.016304</text><rect class="top" x="432" width="200" height="52" rx="10"/><text class="value lime" x="532" y="33" text-anchor="middle">52.2s</text><rect class="top" x="648" width="200" height="52" rx="10"/><text class="value lime" x="748" y="33" text-anchor="middle">3.3</text></g>
      <g transform="translate(0 256)"><text class="row" x="-28" y="34" text-anchor="end">GPT-5.6 Terra</text><rect class="neutral" width="200" height="52" rx="10"/><text class="value" x="100" y="33" text-anchor="middle">8.0 / 10</text><rect class="mid" x="216" width="200" height="52" rx="10"/><text class="value" x="316" y="33" text-anchor="middle">$0.124046</text><rect class="strong" x="432" width="200" height="52" rx="10"/><text class="value cyan" x="532" y="33" text-anchor="middle">107.5s</text><rect class="strong" x="648" width="200" height="52" rx="10"/><text class="value cyan" x="748" y="33" text-anchor="middle">6.0</text></g>
      <g transform="translate(0 320)"><text class="row" x="-28" y="34" text-anchor="end">GPT-5.6 Sol</text><rect class="neutral" width="200" height="52" rx="10"/><text class="value" x="100" y="33" text-anchor="middle">8.0 / 10</text><rect class="warn" x="216" width="200" height="52" rx="10"/><text class="value pink" x="316" y="33" text-anchor="middle">$0.368514</text><rect class="mid" x="432" width="200" height="52" rx="10"/><text class="value" x="532" y="33" text-anchor="middle">229.6s</text><rect class="mid" x="648" width="200" height="52" rx="10"/><text class="value" x="748" y="33" text-anchor="middle">10.0</text></g>
      <g transform="translate(0 384)"><text class="row" x="-28" y="34" text-anchor="end">Qwen 3.6 Flash</text><rect class="warn" width="200" height="52" rx="10"/><text class="value pink" x="100" y="33" text-anchor="middle">5.5 / 10</text><rect class="strong" x="216" width="200" height="52" rx="10"/><text class="value cyan" x="316" y="33" text-anchor="middle">$0.085678</text><rect class="strong" x="432" width="200" height="52" rx="10"/><text class="value cyan" x="532" y="33" text-anchor="middle">96.9s</text><rect class="mid" x="648" width="200" height="52" rx="10"/><text class="value" x="748" y="33" text-anchor="middle">16.5</text></g>
      <g transform="translate(0 448)"><text class="row" x="-28" y="34" text-anchor="end">GPT OSS 120B</text><rect class="warn" width="200" height="52" rx="10"/><text class="value pink" x="100" y="33" text-anchor="middle">5.0 / 10</text><rect class="strong" x="216" width="200" height="52" rx="10"/><text class="value cyan" x="316" y="33" text-anchor="middle">$0.062529</text><rect class="top" x="432" width="200" height="52" rx="10"/><text class="value lime" x="532" y="33" text-anchor="middle">36.6s</text><rect class="top" x="648" width="200" height="52" rx="10"/><text class="value lime" x="748" y="33" text-anchor="middle">4.3</text></g>
    </g>
  </g>
  <g transform="translate(72 790)"><rect width="1296" height="58" rx="14" fill="#0d171d" stroke="#2a3c47"/><text x="22" y="25" font-size="15" font-weight="820" fill="#dfffc0">Kimi wins top-score value. Opus wins top-score speed. Luna wins efficiency.</text><text class="note" x="22" y="46">DeepSeek reaches 9.33/10; GPT OSS is fastest but falls to 5/10.</text></g>
  <text class="note" x="72" y="880">ExploitHunter hard Juice Shop · judge score · model cost · runtime · tool calls</text>
</svg>
